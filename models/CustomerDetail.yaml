title: CustomerDetail
type: object
properties:
  customerId:
    type: integer
    description: Unique ID of the customer record
    example: 27718291
  firstName:
    type: string
    description: First name of the customer
    example: John
  lastName:
    type: string
    description: Last name of the customer
    example: Smith
  email:
    type: string
    description: Email address of the customer
    example: johnsmith@noemail.com
  phone:
    type: string
    description: Phone number of the customer
    example: '12345678'
  dateOfBirth:
    type: string
    description: Date of Birth of the customer in YYYY-MM-DD format
    example: '2001-03-26'
  gender:
    type: string
    enum:
      - Male
      - Female
      - Other
      - PreferNotToSay
    description: 'Gender of the customer, if provided'
    example: Female
  acceptMarketing:
    type: boolean
    description: When true the customer has accepted to receive marketing content
    example: false
  address:
    description: The customer's postal address.
    type: object
    properties:
      street:
        type: string
        description: Street number and name of the customer
        example: 123 Fake Street
      suburb:
        type: string
        description: Suburb of the customer
        example: Orange County
      state:
        type: string
        description: State / province of the customer
        example: CA
      postcode:
        type: string
        description: Post code / ZIP code of the customer
        example: '27385'
      city:
        type: string
        description: City of the customer
        example: Los Angeles
      country:
        type: string
        description: Country of the customer
        example: United States
  flags:
    description: The flags associated with the customer.
    type: array
    items:
      type: object
      properties:
        type:
          type: string
          description: The type of flag against the customer
          example: VIP
        comment:
          type: string
          description: Extra information about the flag
          example: Friend of the owner
        expiryDate:
          type: string
          description: The date the flag is set to expire
          example: '2024-11-22'
description: Detail of a guest record
