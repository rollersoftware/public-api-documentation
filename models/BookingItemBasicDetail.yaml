title: BookingItemBasicDetail
type: object
properties:
  productId:
    type: integer
    description: The Id of the product
    example: 12345678
  quantity:
    type: integer
    description: Quantity of the booking item in the booking
    example: 26
  bookingDate:
    type: string
    description: The date the item is valid for (or from)
    example: '2020-07-31'
  startTime:
    type: string
    description: Session start time in 24hr format
    example: '14:30'
description: Basic information on a booking item in a booking
