title: LocationTime
type: object
description: A time range specific to resource capacity for time-based products
properties:
  startMinutes:
    type: integer
    description: 'The start of a time range, expressed as the number of minutes after the time-based product begins'
    example: 0
  endMinutes:
    type: integer
    description: 'The end of a time range, expressed as the number of minutes after the time-based product begins'
    example: 60
