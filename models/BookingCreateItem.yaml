title: BookingCreateItem
description: A single line item (product and quantity) to include when creating a booking.
type: object
required:
  - productId
  - quantity
  - bookingDate
properties:
  productId:
    type: integer
    description: Variation ID (Child Product ID) of the product being purchased
    example: 12345679
  quantity:
    type: integer
    description: The number of products / items being purchased. The number of tickets generated is Quantity * Product.GroupSize
    example: 5
  bookingDate:
    type: string
    description: The date when the product / event is occurring - depending on the product configuration this may just be the date of the booking where the booking is valid until X time in the future. ISO8601 date format only e.g. 2020-03-21
    example: '2020-07-29'
  startTime:
    type: string
    description: 'Session start time in 24h format e.g. 00:00 = Midnight, 23:59 = 11:59 PM'
    example: '14:00'
  priceOverride:
    type:
      - number
      - 'null'
    description: Use this when the price you're charging is not the same as the product price in ROLLER
    example: 23.8
  tickets:
    type: array
    description: Optionally provide ticket details - the number of tickets must match Quantity * Product.GroupSize
    items:
      type: object
      properties:
        id:
          type: string
          description: Custom ticket ID. When not supplied the default is `<BookingId>-<TicketId>`
          example: 277AHU7610
          maxLength: 32
        name:
          type: string
          description: The name of the ticket holder
          example: John Smith
          maxLength: 50
  partyPackageInclusions:
    type: array
    description: Define which Party Package inclusions have been selected by the guest
    items:
      type: object
      properties:
        productId:
          type: string
          description: The product ID of the selected inclusion
          example: '9817726'
        quantity:
          type: integer
          description: The quantity of the selected inclusion
          example: 2
