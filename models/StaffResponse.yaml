title: StaffResponse
type: object
properties:
  uniqueId:
    type: string
    description: Unique ID of the staff member
    format: uuid
    example: 3c95e94e-242e-4f38-85f6-7270fbfffeac
  roleId:
    type: integer
    description: 'The unique ID of the role to assign to this staff member, that determines the user''s permissions'
    example: 1234
  firstName:
    type: string
    description: First name of the staff member
    example: John
  lastName:
    type: string
    description: Last name of the staff member
    example: Smith
  email:
    type: string
    description: Email of the staff member
    example: john@smith.com
  externalId:
    type: string
    description: External ID of the staff member
    example: abcd
  contactNumber:
    type: string
    description: Contact phone number of the staff member
    example: '0450000000'
  displayName:
    type: string
    description: An optional nickname used for display purposes in apps and the activity stream
    example: John Smith
  staffIdentities:
    type: array
    description: List of optional staff identities attributed to this staff member.
    items:
      enum:
        - Account Owner
        - Primary Contact
        - Billing Contact
        - Technical Contact
  hqVenueGroupTags:
    type: array
    description: List of hqVenueGroupTags the staff member has access to (for HQ venues only)
    items:
      type: string
      example: Managed Venues
  hqVenueUniqueIds:
    type: array
    description: List of hqVenueUniqueIds the staff member has access to (for HQ venues only)
    items:
      type: string
      example: 00000000-0000-0000-0000-000000000000
      format: uuid
  hasVerifiedEmail:
    type: boolean
    description: Indicates whether the staff member's email address has been verified
  isLocked:
    type: boolean
    description: Lock status for the staff member. Prevents login.
