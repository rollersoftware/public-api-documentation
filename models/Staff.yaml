title: Staff
type: object
description: A ROLLER staff member record
properties:
  staffId:
    type: string
    description: Staff ID of the staff member
    example: '91002'
    deprecated: true
  uniqueId:
    type: string
    description: Unique ID of the staff member
    format: uuid
  externalId:
    type: string
    description: External ID of the staff member
  email:
    type: string
    description: Email address of the staff member
    example: dannysmith@funpark.com
  firstName:
    type: string
    description: First name of the staff member
    example: Danny
  lastName:
    type: string
    description: Last name of the staff member
    example: Smith
  contactNumber:
    type: string
    description: Contact phone number of the staff member
    example: 192-0029-2213
  role:
    type: string
    description: Staff role / permission level
    example: Administrator
  createdDate:
    type: string
    description: Date the staff record was created
    example: '2020-07-14T03:23:07Z'
    format: date-time
  hasVerifiedEmail:
    type: boolean
    description: Indicates whether the staff member's email address has been verified
  isLocked:
    type: boolean
    description: Lock status for the staff member. Prevents login
