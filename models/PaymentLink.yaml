title: PaymentLink
type: object
description: Details of a payment event via a payment link
properties:
  id:
    type: integer
    description: Unique ID of the payment link
    example: 188
  bookingUniqueIdentifier:
    type: string
    description: Unique ID of the booking the payment link is for
    example: ffdae420-a912-4d93-9234-9faca5e6194f
  amount:
    type: number
    description: Amount paid via the payment link
    example: 23.3
  url:
    type: string
    description: URL of the payment link
    example: steven@toastoflondon.com
  email:
    type: string
    description: Email of the booking holder
    example: steven@toastoflondon.com
  phone:
    type: string
    description: Contact phone number of the booking holder
    example: '0475755223'
  bookingPaymentId:
    type:
      - integer
      - 'null'
    description: Unique ID of the booking payment record
