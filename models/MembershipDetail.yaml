title: MembershipDetail
description: Detail of a membership associated with a booking.
type: object
properties:
  membershipId:
    type: integer
    description: The unique identifier of the membership.
  customerId:
    type:
      - integer
      - 'null'
    description: The unique identifier of the customer the membership belongs to.
  bookingItemId:
    type: integer
    description: The unique identifier of the booking item the membership corresponds to.
  bookingItemPartId:
    type: integer
  recurringCost:
    type: number
    description: The recurring payment amount charged for the membership.
  name:
    type: string
  code:
    type: string
