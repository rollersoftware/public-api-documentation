title: SignedWaiver
type: object
properties:
  signedWaiverId:
    type: integer
    description: Unique ID of the signed waiver record
    example: 18829122
  parentSignedWaiverId:
    type:
      - integer
      - 'null'
    description: The `signedWaiverId` of the parent/guardian's signed waiver (Only returned for minor's signed waivers)
    example: 18829121
  waiverId:
    type: integer
    description: Unique ID of the version of waiver the guest has signed
    example: 13
  firstName:
    type: string
    description: First name of the guest as completed on the signed waiver
    example: Steven
  lastName:
    type: string
    description: Second name of the guest as completed on the signed waiver
    example: Toast
  guestId:
    type:
      - integer
      - 'null'
    description: Unique ID of the guest record of the signed waiver holder
    example: 64310293
  dateOfBirth:
    type: string
    format: date
    description: Date of birth of the signed waiver holder
    example: '2004-07-13'
  email:
    type: string
    description: Email of the signed waiver holder (not returned for minors).
    example: steven@toastoflondon.com
  contactNumber:
    type: string
    description: Contact phone number of the signed waiver holder (not returned for minors).
    example: '0475755223'
  isForMinor:
    type: boolean
    description: 'Identifies whether the guest is a minor or not at the time of signing. Returns `true` for minors, `false` for adults.'
  expiryDate:
    type: string
    format: date-time
    description: Date the signed waiver expires
    example: '2026-07-14T03:43:40.4085882Z'
  isValid:
    type:
      - boolean
      - 'null'
    description: Only returned if "waiver verification" is required. Returns `true` for verified waivers and `false` for unverified.
  createdDate:
    type: string
    format: date-time
    description: Date the signed waiver record was created
    example: '2020-07-31T03:43:40.4085882Z'
description: Record of a waiver signed by a guest
