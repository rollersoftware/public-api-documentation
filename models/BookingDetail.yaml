title: BookingDetail
description: Full detail of a booking, including its items, customer, discounts, and payment information.
type: object
properties:
  bookingReference:
    type: string
    description: ROLLER Booking Id
    example: '12345678'
  externalId:
    type: string
    description: External Booking Id posted when booking created via API
    example: ILLF2883456
  uniqueId:
    type: string
    description: Unique Booking Id
    example: ffdae420-a912-4d93-9234-9faca5e6194f
  createdDate:
    type: string
    description: DateTime the booking was made
    example: '2020-07-31T03:43:40.4085882+00:00'
  channel:
    type: string
    description: The application that created the booking
    enum:
      - VenueManager
      - POS
      - Online
      - Forms
      - SSK
      - DataImport
      - Api
      - Marketplaces
    example: Api
  status:
    type: string
    description: The current payment status of the booking
    enum:
      - Draft
      - NoPaymentRequired
      - PendingPayment
      - PartiallyPaid
      - Paid
      - Cancelled
      - Deleted
    example: Paid
  name:
    type: string
    description: Title of the booking. Name can be different to the booking owner name (defaults to the booking owner's name if not specified)
    example: Sports Club Booking
  customerId:
    type: integer
    description: Id of the booking owner. Use the customer API to get customer detail
    example: 77388293
  companyId:
    type: integer
    description: Id of the company who made the booking
    example: 87732719
  comments:
    type: string
    description: Additional information about the booking
    example: Customer has not visited before
  total:
    type: number
    description: Total cost of the booking
    example: 55.5
  remainder:
    type: number
    description: Amount owing on the booking
    example: 20.8
  fees:
    type: number
    description: Amount of booking fees applied to the booking
    example: 1.5
  discount:
    type: number
    description: Discount amount applied to the booking
    example: 10.2
  items:
    $ref: ./Items.yaml
    description: Items in the booking
  deviceId:
    type: integer
    description: Unique ID of the POS device used to make the sale (if applicable)
    example: 37881
  posNotes:
    type: string
    description: "Notes saved from POS when processing a booking\r\n"
    example: 'Guest will return to pickup lost&found item #004'
  payments:
    type: array
    description: Payment records against the booking
    items:
      type: object
      properties:
        bookingPaymentId:
          type: integer
          description: Unique ID of the payment record
        transactionId:
          type: string
          description: "Unique ID of the transaction record.\r\n\r\nWhere the payment method is `Giftcard`, the `transactionId` is the giftcard ID used to make the payment."
        paymentMethod:
          type: string
          description: "The method of payment for this record. \r\n* CreditCard\r\n* CreditCardPreAuth\r\n* Cash\r\n* Eftpos\r\n* PayPal\r\n* Other\r\n* Giftcard\r\n* BankTransfer\r\n* BPay\r\n* Cheque\r\n* Prepaid\r\n* Points\r\n* Wallet\r\n* Groupon\r\n* Cashless Card\r\n* ThirdParty\r\n"
        total:
          type: number
          description: Total payment amount
        tip:
          type: number
          description: Total tip amount
        createdDate:
          type: string
          format: date-time
          description: Created date of the payment record
  source:
    type: string
    description: The application that created the booking
    enum:
      - VenueManager
      - POS
      - Online
      - Forms
      - SSK
      - DataImport
      - Api
      - Marketplaces
    example: Api
    deprecated: true
