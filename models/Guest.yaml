title: Guest
type: object
description: Record of guest details
required:
  - firstName
  - lastName
  - email
  - phone
properties:
  firstName:
    type: string
    description: First name of the customer
    example: John
    maxLength: 32
  lastName:
    type: string
    description: Last name of the customer
    example: Smith
    maxLength: 32
  email:
    type:
      - string
      - 'null'
    description: "Email address of the customer (Required only if `phone` is not provided).\r\n* Provided value must be a valid email pattern."
    example: johnsmith@noemail.com
    maxLength: 256
  phone:
    type:
      - string
      - 'null'
    description: Phone number of the customer (Required only if `email` is not provided).
    example: '12345678'
    maxLength: 20
  dateOfBirth:
    type:
      - string
      - 'null'
    description: "Date of Birth of the guest in `YYYY-MM-DD` format.\r\n* Date of Birth must not be before 1900 or in the future."
    example: '2001-03-26'
  gender:
    enum:
      - Male
      - Female
      - Other
      - PreferNotToSay
    description: Gender of the guest
  acceptMarketing:
    type: boolean
    description: When true the guest has accepted to receive email marketing content
    example: false
  acceptMarketingSms:
    type: boolean
    description: When true the guest has accepted to receive SMS marketing content
    example: false
  taxIdentificationNumber:
    type: string
    description: Tax identification number that may be used for maintaining fiscal compliance
    maxLength: 64
  address:
    description: The guest's postal address.
    type:
      - object
      - 'null'
    properties:
      street:
        type: string
        description: Street number and name of the customer
        example: 123 Fake Street
        maxLength: 256
      suburb:
        type: string
        description: Suburb of the customer
        example: Orange County
        maxLength: 64
      city:
        type: string
        description: City of the customer
        example: Los Angeles
        maxLength: 64
      state:
        type: string
        description: State / province of the customer
        example: CA
        maxLength: 64
      postcode:
        type: string
        description: Post code / ZIP code of the customer
        example: '27385'
        maxLength: 12
      country:
        type: string
        description: Country of the customer
        example: United States
        maxLength: 64
  flags:
    description: The flags associated with the guest.
    type: array
    items:
      $ref: ./CustomerFlag.yaml
