title: 0_Unused_PaymentCreate
x-stoplight:
  id: l068vofcog1dg
type: object
x-internal: true
description: Details for adding payments to a booking
required:
  - id
  - paymentType
properties:
  id:
    type: string
    x-stoplight:
      id: 31zqfq9pjl2nj
    maxLength: 32
    description: Payment or transaction ID
    example: HYA728830013
  paymentType:
    x-stoplight:
      id: zydvy7t3tv4rw
    enum:
      - CreditCard
      - CreditCardPreAuth
      - Cash
      - Cheque
      - BankTransfer
      - Other
    description: The type of tender used for the payment
  amount:
    type: number
    x-stoplight:
      id: 0ac3efrapw4gf
    example: 11.55
    description: Total payment amount (including fees) in the venue's currency
  creditCardFees:
    type: number
    x-stoplight:
      id: hq09ubcnq4728
    description: Credit card fees associated with the payment
    example: 0.34
  transactionFees:
    type: number
    x-stoplight:
      id: ilgeoacrxuege
    description: Transaction or product fees associated with the payment (Do not include credit card fees)
    example: 1.21
  transactionDate:
    type:
      - string
      - 'null'
    x-stoplight:
      id: 9kiyo3a4bwkit
    description: Datetime of the transaction in UTC
    example: '2025-07-14T09:35:18.5306035+00:00'
  cardLast4Digits:
    type: string
    x-stoplight:
      id: dyxmf4yf3z3qy
    maxLength: 4
    example: '1424'
    description: 'Last 4 digits of the card used for payment '
  paymentBrand:
    type: string
    x-stoplight:
      id: c4z5wvih5bsas
    description: The payment method. Only supported for ROLLER Payments Card-Present transactions
    example: mc
  merchantId:
    type: string
    x-stoplight:
      id: b3h3eywmyc6a6
    maxLength: 64
    description: Payment provider merchant ID. Only supported for ROLLER Payments Card Present transactions
    example: 60C7BFB6ED1F8194FE203
  recurringPaymentToken:
    type: string
    x-stoplight:
      id: 0jbytk5zoci0h
    maxLength: 64
    description: For recurring billing memberships. Only supported for ROLLER Payments Card Present transactions
