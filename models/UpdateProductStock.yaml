title: UpdateProductStock
x-stoplight:
  id: xm2j37f5fezon
type: object
properties:
  externalId:
    type: string
    x-stoplight:
      id: o4b5avlxqt0ku
    maxLength: 64
    example: SHIRTS_M
    description: External product reference (parent product).
  productId:
    type: string
    x-stoplight:
      id: 1lwq2dsyb9lku
    pattern: ^\d+$
    example: '876366'
    description: ROLLER product ID (parent product).
  name:
    type: string
    x-stoplight:
      id: n4hpkozk9kgz0
    maxLength: 128
    example: Coffee
    description: Parent product name
  hqMasterName:
    type: string
    x-stoplight:
      id: r5j8f0j3lu4xv
    description: For use with HQ venues only. Allows linking all variations of this master product for management and reporting purposes.
    example: Beverages
  reportingCategory:
    type: string
    x-stoplight:
      id: osc23mywjcvdm
    description: Reporting category to map the product to
    example: Food and beverage
  products:
    type: array
    x-stoplight:
      id: uthf1z9qf166c
    items:
      x-stoplight:
        id: i1nshdvk8z5ye
      type: object
      properties:
        externalId:
          type: string
          x-stoplight:
            id: cbg285hx5gc5m
          maxLength: 64
          default: SHIRTS_M_00177
          description: External product reference (child/Variation product).
        productId:
          type: string
          x-stoplight:
            id: njjb9tx82egsl
          pattern: ^\d+$
          example: '876367'
          description: ROLLER product ID (child/variation product).
        name:
          type: string
          x-stoplight:
            id: 20eb97azluwpo
          description: Child/variation product name
          maxLength: 128
          example: Latte
        hqMasterCode:
          type: string
          x-stoplight:
            id: tm1zyz1ayzmh6
          description: For use with HQ venues only. Allows linking all variations of this master product for management and reporting purposes.
          example: BEV
        price:
          type:
            - number
            - 'null'
          x-stoplight:
            id: k5rpsjoktymvk
          default: 0
          description: Product price
          example: 25.5
        costOfGoods:
          type:
            - number
            - 'null'
          x-stoplight:
            id: o9v8zwr5tkt4q
          example: 1.5
          description: Cost associated with producing/selling the stock item
        parLevel:
          type:
            - integer
            - 'null'
          x-stoplight:
            id: orvdymo13xhgl
          minimum: 0
          description: The quantity at which the stock should be replenished
          example: 5
        taxCode:
          type: string
          x-stoplight:
            id: j5votunrqwbuz
          example: State Tax
          description: The name of the custom tax variation defined within ROLLER
        taxId:
          type:
            - integer
            - 'null'
          x-stoplight:
            id: qjpa0p8wqe6r4
          description: The ID of the custom tax variation defined within ROLLER
          example: 52
        barcodeId:
          type: string
          x-stoplight:
            id: 39dbggulx17ze
          example: '588199203'
          description: Barcode for the product which can be scanned
        cost:
          type:
            - number
            - 'null'
          x-stoplight:
            id: 2m2ksj23evd51
          example: 25.5
          description: 'Cost of the product (Deprecated, replaced by `price`)'
          default: 0
          deprecated: true
