title: BookingCreateCustomerAddress
description: The postal address of the booking owner, supplied when creating a booking.
type: object
properties:
  street:
    type: string
    description: Street number and name of the booking owner
    example: 123 Fake Street
  suburb:
    type: string
    description: Suburb of the booking owner
    example: Orange County
  state:
    type: string
    description: State / province of the booking owner
    example: CA
  postcode:
    type: string
    description: Post code / ZIP code of the booking owner
    example: "27385"
  city:
    type: string
    description: City of the booking owner
    example: Los Angeles
  country:
    type: string
    description: Country of the booking owner
    example: United States
