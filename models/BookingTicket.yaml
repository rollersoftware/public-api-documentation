title: BookingTicket
description: A single ticket within a booking.
type: object
properties:
  ticketId:
    type: string
    description: The ROLLER ticket Id
    example: 2880029-2746533
  customTicketId:
    type: string
    description: Ticket identifier specified manually by the user e.g. the code from a pre-printed membership card
    example: '2299300211'
  ticketHolderName:
    type: string
    description: Name of the ticket holder
    example: Ben Smith
  membershipStatus:
    type: string
    description: 'Only returned if the ticket is a Membership, returns the current status of the membership. Can be - Current, Pending Activation, Declined Payment, Terminated, Pending Cancellation, Upgraded, Expired, Paused, Pending Pause.'
    example: Current
  membershipPauseDate:
    type: string
    description: 'Only returned if the ticket is a Membership with a status of Paused or Pending Pause. The date the current or upcoming membership pause begins, in venue local time (`yyyy-MM-dd`).'
    example: '2026-07-14'
  membershipResumeDate:
    type: string
    description: 'Only returned if the ticket is a Membership with a status of Paused or Pending Pause. The date the membership pause ends and the membership resumes, in venue local time (`yyyy-MM-dd`).'
    example: '2026-08-14'
  membershipCancellationDate:
    type: string
    description: 'Only returned if the ticket is a Membership with a status of Pending Cancellation or Terminated. The scheduled cancellation date of the membership, in venue local time (`yyyy-MM-dd`).'
    example: '2026-09-01'
  photoUrl:
    type: string
    description: URL of the photo taken for the ticket holder
    example: 'https://cdn.rollerdigital.com/ticket/6DLMXCk-Efzpkv8XgGg.jpe'
  locations:
    type: array
    description: Array of resourceIds of the resources this ticket has reserved capacity for
    example:
      - 2334
      - 2883
    items:
      type: integer
  customerId:
    type: integer
    description: Customer ID of the customer linked to this specific ticket via an attached waiver
    example: 849993002
  signedWaiverId:
    type: integer
    description: Signed waiver ID of the waiver linked to this specific ticket
    example: 849995753
  externalTicketId:
    type: string
    description: Deprecated. Replaced by `customTicketId`.
    deprecated: true
  name:
    type: string
    description: Deprecated. Replaced by `ticketHolderName`.
    deprecated: true
