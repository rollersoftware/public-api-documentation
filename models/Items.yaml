title: Items
description: A booking item record as returned by the Reporting API.
type: object
properties:
  bookingItemId:
    type: integer
    description: 'Unique ID of an item within the booking (can be multiple, and each item can have a quantity >1)'
    example: 2387746211
  productId:
    type: integer
    description: Variation ID (Child Product ID) of the booking item
    example: 123999221
  quantity:
    type: integer
    description: Quantity of the booking item in the booking
    example: 26
  bookingDate:
    type: string
    description: The date the item is valid for (or from)
    example: '2020-07-31'
  bookingEndDate:
    type: string
    description: The date the item is valid until
    example: '2020-07-31'
  sessionStartTime:
    type: string
    description: Session start time in 24hr format
    example: '14:30'
  sessionEndTime:
    type: string
    description: "Session end time in 24hr format.\r\n\r\n(Note: an endtime of midnight will be 00:00)."
    example: '16:30'
  tickets:
    $ref: ./BookingTicket.yaml
  cost:
    type: number
    description: Unit cost for each quantity of this item
    example: 8.9
  discount:
    type: number
    description: 'The total discount specifically against this booking item (across all quantities, not per quantity)'
    example: 4.5
  modifiers:
    description: The modifiers applied to the booking item.
    type: array
    items:
      type: object
      properties:
        modifierId:
          type: string
          description: IDs of modifiers that have been added to this booking item
          example: 657b6cc8-0532-4299-bd44-182674fcb68d
        amount:
          type: integer
          description: The value of the modifier that has been added to the booking
          example: 1
        quantity:
          type: integer
          description: The number of times this modifier has been applied to this booking item
          example: 1
