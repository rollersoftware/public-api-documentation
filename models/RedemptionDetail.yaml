title: RedemptionDetail
description: The redemption detail returned for one or more tickets.
type: object
properties:
  redemptions:
    description: The list of ticket redemptions.
    type: array
    items:
      type: object
      properties:
        redemptionDate:
          type: string
          description: Date/time of the redemption
          example: '2021-12-07T04:20:35Z'
        ticketHolderName:
          type: string
          description: Name of the ticket holder
          example: Ben Smith
        ticketId:
          type: string
          description: The ROLLER ticket Id
          example: 2880029-2746533
        customTicketId:
          type: string
          description: Ticket identifier specified manually by the user e.g. the code from a pre-printed membership card
          example: '2299300211'
        photoUrl:
          type: string
          description: URL of the photo on the ticket
        quantityRedeemed:
          type:
            - integer
            - 'null'
          description: The number of times the ticket has been redeemed (including past redemptions)
          example: 3
        isUsed:
          type: boolean
          description: Whether or not all uses of the ticket have been redeemed. This will always show `false` if the ticket has unlimited uses.
          example: true
        deviceId:
          type:
            - integer
            - 'null'
          description: POS device where the ticket was redeemed
          example: 984
        customerId:
          type:
            - integer
            - 'null'
          example: 1522
          description: Guest ID
        customerFlags:
          type: array
          items:
            $ref: ./CustomerFlag.yaml
        membershipStatus:
          type: string
          description: Status of the membership
          example: Current
        locations:
          type: array
          description: List of resource IDs
          items:
            type: string
        multiPass:
          $ref: ./MultiPass.yaml
        numberRedeemed:
          type:
            - integer
            - 'null'
          deprecated: true
          description: see `quantityRedeemed`
        externalTicketId:
          type: string
          deprecated: true
          description: See `customTicketId`
        name:
          type: string
          deprecated: true
          description: See `ticketHolderName`
