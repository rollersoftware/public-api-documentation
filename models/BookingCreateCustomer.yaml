title: BookingCreateCustomer
description: The booking owner (customer) details supplied when creating a booking.
type: object
required:
  - firstName
  - lastName
  - email
  - phone
properties:
  firstName:
    type: string
    description: First name of the booking owner
    example: John
  lastName:
    type: string
    description: Last name of the bookingowner
    example: Smith
  email:
    type: string
    description: Email address of the booking owner
    example: johnsmith@noemail.com
  phone:
    type: string
    description: Phone number of the booking owner
    example: '12345678'
  gender:
    type: string
    enum:
      - Male
      - Female
      - Other
      - PreferNotToSay
    description: Gender of the booking owner
  acceptMarketing:
    type: boolean
    description: When true the guest has accepted to receive email marketing content
    example: false
  acceptMarketingSms:
    type: boolean
    description: When true the guest has accepted to receive SMS marketing content
    example: false
  taxIdentificationNumber:
    type: string
    maxLength: 64
    description: Tax identification number that may be used for maintaining fiscal compliance
  address:
    $ref: ./BookingCreateCustomerAddress.yaml
