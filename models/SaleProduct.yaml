title: SaleProduct
type: object
description: Sale details of the product variation (ticket type) on offer
properties:
  id:
    type: string
    description: Variation ID (Child Product ID)
    example: '107400'
  name:
    type: string
    description: Variation Name (Child Product Name)
    example: Adult Ticket
  description:
    type: string
    description: Brief description of the product
    example: Adult tickets are for individuals 13 years and older
    maxLength: 150
  imageUrl:
    type: string
    description: Product image URL
    example: 'https://someimage.com/10002'
  productCategoryIds:
    type: array
    description: The product categories this product belongs to
    items:
      type: string
      example: /30007/2/
  price:
    type: number
    example: 25.5
    description: Product price
  costOfGoods:
    type:
      - number
      - 'null'
    description: Cost associated with producing/selling the stock item
  tax:
    type: number
    description: The tax percentage to be charged on this product
    example: 7.5
  taxId:
    type:
      - integer
      - 'null'
    description: The ID of the custom tax variation defined within ROLLER
    example: 45
  fee:
    type:
      - number
      - 'null'
    description: A fee that is applied when the product is purchased
    example: 25.5
  groupSize:
    type: integer
    description: "Group size is a multiple applied to the quantity purchased. \r\n- eg: Purchasing a single $300 product configured with a group size of 15, will still cost $300 but will reserve 15 resource capacity and generate 15 separate tickets"
    example: 15
  isTaxInclusive:
    type: boolean
    description: 'When true, the product cost already includes the tax amount. When false, tax must be added to the cost.'
  minPurchase:
    type: integer
    description: The minimum quantiy allowed to be purchased in a booking
    example: 10
  maxPurchase:
    type:
      - integer
      - 'null'
    description: The maximum quantiy allowed to be purchased in a booking
    example: 100
  forceMinPurchase:
    type: boolean
    description: 'Whether or not the user must purchase the `minPurchase` quantity of any variations (ticket types) of the product, when purchasing via progressive checkouts.'
  hasUserDefinedCost:
    type: boolean
    description: Whether or not the user is able to enter the price they want to pay for this product. Example would be a custom value gift card
  minUserDefinedCost:
    type:
      - number
      - 'null'
    description: The minimum product cost the purchaser can set
    example: 1000
  maxUserDefinedCost:
    type:
      - number
      - 'null'
    description: The maximum product cost the purchaser can set
    example: 1000
  locations:
    type: array
    description: List of resources assigned to the product
    items:
      $ref: ./ProductLocation.yaml
  locationTimes:
    type: array
    description: Resource time definitions
    items:
      $ref: ./ProductLocationTime.yaml
  packageItems:
    type: array
    description: Product detail of items contained within a package
    items:
      $ref: ./SaleProductPackageItem.yaml
  packagePricingType:
    enum:
      - PerGuest
      - PerPackage
    description: 'The way inclusions are quantified for a party package product, either X items per guest or X items per package'
  recurringPayment:
    type: object
    description: Recurring payment detail for membership products
    properties:
      paymentFrequencyId:
        enum:
          - Daily
          - Weekly
          - Monthly
          - Yearly
      paymentFrequencyMultiplier:
        type: integer
      numberOfPayments:
        type:
          - integer
          - 'null'
      minNumberOfPayments:
        type:
          - integer
          - 'null'
  sessionDiscounts:
    type: array
    description: 'Discounts for buying consecutive sessions, if any.'
    items:
      type: object
      properties:
        numberOfSessions:
          type: integer
        amountOff:
          type:
            - number
            - 'null'
        percentOff:
          type:
            - number
            - 'null'
  isSuspended:
    type: boolean
    description: Whether the product is suspended from online sales
  barcodeId:
    type: string
    description: Barcode for the product which can be scanned
    example: '588199203'
  parLevel:
    type:
      - integer
      - 'null'
    description: A predefined ideal minimum quantity
    example: 35
    minimum: 0
    maximum: 32767
  cost:
    type: number
    description: 'Cost of the product (Deprecated, replaced by `price`)'
    example: 25.5
    deprecated: true
