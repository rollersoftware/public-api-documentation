title: Page
description: A paginated response envelope containing the current page metadata and the returned items.
type: object
properties:
  currentPage:
    type: integer
    description: Current page number
    format: int64
  totalPages:
    type: integer
    format: int64
    description: Total number of pages
  totalItems:
    type: integer
    description: Total number of items
  itemsPerpage:
    type: integer
    format: int64
    description: Number of items per page
  items:
    type: array
    description: List of each returned item/record
    items:
      type: object
