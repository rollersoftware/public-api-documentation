title: CustomerMultiPass
type: object
description: Multi-pass balance for a guest
properties:
  BookingItemId:
    type: integer
    description: The booking item identifier for this multi-pass
  ProductId:
    type: integer
    description: The product identifier for the multi-pass variation
  ParentProductName:
    type: string
    description: Name of the parent product the multi-pass belongs to
  Name:
    type: string
    description: Name of the product variation
  UsesRemaining:
    type: integer
    description: Number of uses remaining on the multi-pass
  UsesTotal:
    type: integer
    description: Total number of uses allocated to this multi-pass
  ExpiryDate:
    type:
      - string
      - 'null'
    description: 'Date the multi-pass expires, if applicable'
  IsExpired:
    type: boolean
    description: Whether the multi-pass has passed its expiry date
  IsExhausted:
    type: boolean
    description: Whether the multi-pass has no remaining uses
