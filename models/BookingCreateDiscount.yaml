title: BookingCreateDiscount
description: A discount to apply to a booking at creation time.
type: object
properties:
  code:
    type: string
    description: The discount code used by the customer
    example: JMA99281
  amount:
    type: number
    description: The dollar amount of the discount that applies to the booking
    example: 4.5
  percentage:
    type: number
    description: "The discount percentage that applies to the booking as a whole, eg. 10 for 10% off"
    example: 10
