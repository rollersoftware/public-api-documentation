  /data/signedwaivers:
    get:
      tags:
        - Customers
      summary: Get signed waivers
      description: '> Returns records of waivers signed by customers'
      parameters:
        - name: startDate
          in: query
          description: The date (yyyy-mm-dd) you need data for
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-29'
        - name: endDate
          in: query
          description: Should be +1 day from the startDate
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-30'
        - name: pageNumber
          in: query
          description: 'Optional, default value = 1'
          required: false
          schema:
            type: integer
            example: 1
        - name: pageSize
          in: query
          description: 'Optional, default value = 100'
          required: false
          schema:
            type: integer
            example: 100
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  signedWaiverId:
                    type: string
                    description: Unique identifier for the waiver record
                    example: '18829122'
                  parentSignedWaiverId:
                    type: string
                    description: Only returned for minor's waivers - will be the SignedWaiverId of their parent/guardians waiver
                    example: '18829121'
                  waiverId:
                    type: string
                    description: The identifier of the version of the waiver they have signed
                    example: '2918'
                  firstName:
                    type: string
                    description: First name of the customer as completed on the waiver
                    example: Danny
                  lastName:
                    type: string
                    description: Second name of the customer as completed on the waiver
                    example: Smith
                  customerId:
                    type: string
                    description: Unique identifier of the customer record of the waiver holder
                    example: '64310293'
                  dateOfBirth:
                    type: string
                    description: Date of birth of the waiver holder
                    example: '2004-07-13'
                  email:
                    type: string
                    description: Email address of the waiver holder. Not returned for minors.
                    example: dannysmith@noemail.com
                  contactNumber:
                    type: string
                    description: Contact phone number of the waiver holder. Not returned for minors.
                  isForMinor:
                    type: boolean
                    description: 'Identifies whether the customer is a minor or not at the time of signing. Returns true for minors, false for adults.'
                    example: true
                  expiryDate:
                    type: string
                    description: Date the waiver expired
                    example: '2020-02-11T12:56:02Z'
                  modifiedDate:
                    type: string
                    description: Date the waiver record was most recently modified
                    example: '2019-02-11T12:56:02Z'
                  isValid:
                    type: boolean
                    description: Only returned if waiver verification is required. Returns true for verified waivers and false for unverified.
                    example: true
                  createdDate:
                    type: string
                    description: Date the waiver record was created
                    example: '2019-02-11T12:56:02Z'
              examples:
                Example:
                  value:
                    signedWaiverId: '18829122'
                    parentSignedWaiverId: '18829121'
                    waiverId: '2918'
                    firstName: Danny
                    lastName: Smith
                    customerId: '64310293'
                    dateOfBirth: '2004-07-13'
                    email: dannysmith@noemail.com
                    contactNumber: string
                    isForMinor: true
                    expiryDate: '2020-02-11T12:56:02Z'
                    modifiedDate: '2019-02-11T12:56:02Z'
                    isValid: true
                    createdDate: '2019-02-11T12:56:02Z'
      operationId: get-signed-waivers
