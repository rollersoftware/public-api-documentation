  /data/membershipstatuses:
    get:
      tags:
        - Customers
      summary: Get membership statuses
      description: '> Returns status change log for memberships based on status modified date'
      parameters:
        - name: date
          in: query
          description: The date (yyyy-mm-dd) you need data for
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-29'
        - name: bookingReference
          in: query
          description: Unique identifier for a booking
          required: false
          schema:
            type: string
            example: '6679917'
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  eventDate:
                    type: string
                    description: The date/time of the membership event
                    example: '2020-02-25T01:26:01Z'
                  bookingReference:
                    type: string
                    description: Booking ID of the membership booking
                    example: '29918293'
                  ticketId:
                    type: string
                    description: Ticket ID of the specific membership
                    example: 29918293-672109201
                  customTicketId:
                    type: string
                    description: Custom ticket ID of the specific membership
                    example: '28819'
                  previousStatus:
                    type: string
                    description: "The membership status before the event. This is the status change log (reporting) value.\r\n\r\nVALUE|ID\r\n-|-\r\n`Current`|`1`\r\n`Pending Activation`|`2`\r\n`Declined Payment`|`4`\r\n`Terminated`|`5`\r\n`Pending Cancellation`|`6`\r\n`Upgraded`|`7`\r\n`Expired`|`8`\r\n`Upgraded from pass`|`9`\r\n`Renewed`|`10`\r\n`Imported`|`11`\r\n`GroupMembership`|`12`\r\n`Pending Pause`|`13`\r\n`Paused`|`14`"
                    enum:
                      - Current
                      - Pending Activation
                      - Declined Payment
                      - Terminated
                      - Pending Cancellation
                      - Upgraded
                      - Expired
                      - Upgraded from pass
                      - Renewed
                      - Imported
                      - GroupMembership
                      - Pending Pause
                      - Paused
                    example: Current
                  newStatus:
                    type: string
                    description: "The membership status after the event. This is the status change log (reporting) value.\r\n\r\nVALUE|ID\r\n-|-\r\n`Current`|`1`\r\n`Pending Activation`|`2`\r\n`Declined Payment`|`4`\r\n`Terminated`|`5`\r\n`Pending Cancellation`|`6`\r\n`Upgraded`|`7`\r\n`Expired`|`8`\r\n`Upgraded from pass`|`9`\r\n`Renewed`|`10`\r\n`Imported`|`11`\r\n`GroupMembership`|`12`\r\n`Pending Pause`|`13`\r\n`Paused`|`14`"
                    enum:
                      - Current
                      - Pending Activation
                      - Declined Payment
                      - Terminated
                      - Pending Cancellation
                      - Upgraded
                      - Expired
                      - Upgraded from pass
                      - Renewed
                      - Imported
                      - GroupMembership
                      - Pending Pause
                      - Paused
                    example: Current
              examples:
                Example:
                  value:
                    eventDate: '2020-02-25T01:26:01Z'
                    bookingReference: '29918293'
                    ticketId: 29918293-672109201
                    customTicketId: '28819'
                    previousStatus: Pending Activation
                    newStatus: Current
      operationId: get-membership-statuses
