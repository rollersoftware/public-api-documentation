          schema:
            type: string
            format: date
            example: '2020-07-29'
        - name: endDate
          in: query
          description: Should be +1 day from the startDate
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-30'
        - name: pageNumber
          in: query
          description: 'Optional, default value = 1'
          required: false
          schema:
            type: integer
            example: 1
        - name: pageSize
          in: query
