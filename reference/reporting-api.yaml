          required: false
          schema:
            type: integer
            example: 100
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  customerId:
                    type: string
                    description: Unique identifier of the customer
                    example: '201882947'
                  firstName:
                    type: string
                    description: First name of the customer
                    example: Danny
                  lastName:
                    type: string
                    description: Last name of the customer
                    example: Smith
                  email:
                    type: string
                    description: Email address of the customer
                    example: dannysmith@noemail.com
                  contactNumber:
                    type: string
                    description: Contact phone number of the customer
                    example: 130-2291-5883
                  dateOfBirth:
                    type: string
                    description: Date of birth of the customer
                    example: '1978-12-28'
                  gender:
                    type: string
                    description: Gender of the customer
                    example: Male
                  postcode:
                    type: string
                    description: Postcode of the customer
                    example: '90277'
                  country:
                    type: string
                    description: Country of address of the customer
                    example: United States
                  acceptMarketing:
                    type: boolean
                    description: When true the guest has accepted to receive email marketing content
                    example: false
                  acceptMarketingSms:
                    type: boolean
                    description: When true the guest has accepted to receive SMS marketing content
                    example: false
                  createdDate:
                    type: string
                    description: Date the customer record was created
                    example: '2020-01-01T16:40:30Z'
                  modifiedDate:
                    type: string
                    description: Date the customer record was most recently modified
                    example: '2020-01-01T16:40:30Z'
                  taxIdentificationNumber:
                    type: string
                    description: Tax identification number that may be used for maintaining fiscal compliance
                  address:
                    type: object
                    properties:
                      street:
                        type: string
                        description: Street number and name of the customer
                        example: 123 Fake Street
                      suburb:
                        type: string
                        description: Suburb of the customer
                        example: Orange County
                      state:
                        type: string
                        description: State / province of the customer
                        example: CA
                      postcode:
                        type: string
                        description: Post code / ZIP code of the customer
                        example: '27385'
                      city:
                        type: string
                        description: City of the customer
                        example: Los Angeles
                      country:
                        type: string
                        description: Country of the customer
                        example: United States
                  flags:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          enum:
                            - ban
                            - vip
                            - medical
                            - alert
                            - competency
                          description: The type of flag against the customer
                        comment:
                          type: string
                          description: Extra information about the flag
                        expiryDate:
                          type: string
                          format: date
                          description: The date the flag is set to expire
              examples:
                Example:
                  value:
                    customerId: '201882947'
                    firstName: Danny
                    lastName: Smith
                    email: dannysmith@noemail.com
                    contactNumber: 130-2291-5883
                    dateOfBirth: '1978-12-28'
                    gender: Male
                    postcode: '90277'
                    country: United States
                    acceptMarketing: false
                    createdDate: '2020-01-01T16:40:30Z'
                    modifiedDate: '2020-01-01T16:40:30Z'
                    address:
                      street: 123 Fake Street
                      suburb: Orange County
                      state: CA
                      postcode: '27385'
                      city: Los Angeles
                      country: United States
      operationId: get-customers
  /reporting/gxs:
    get:
      tags:
        - Customers
      summary: Get GX score responses
      description: '> Returns GX Score Responses based on the response modified date'
      parameters:
        - name: startDate
          in: query
          description: The date (yyyy-mm-dd) you need data for
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-29'
        - name: endDate
          in: query
          description: Should be +1 day from the startDate
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-30'
        - name: pageNumber
          in: query
          description: 'Optional, default value = 1'
          required: false
          schema:
            type: integer
            example: 1
        - name: pageSize
          in: query
          description: 'Optional, default value = 100'
          required: false
          schema:
            type: integer
            example: 100
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  gxsResponseId:
                    type: string
                    example: '32659'
                    description: Unique ID of the GX score response
                  customerId:
                    type: string
                    example: '49043110'
                    description: Unique identifier of the customer submitting the GX score response
                  bookingReference:
                    type: string
                    example: '80821183'
                    description: 'Unique identifier for a booking. If this field has no data, then the GX Score response was commenced by the customer from either a QR Code or URL link'
                  isFan:
                    type: boolean
                    example: true
                    description: Is set to true when the overall rating is set as 4 or 5
                  isCritic:
                    type: boolean
                    example: false
                    description: 'Is set to true when the overall rating is set as 1, 2 or 3'
                  overallRating:
                    type: integer
                    example: 4
                    description: Customers answer to the first question of the GX Score survey
                  serviceRating:
                    type: integer
                    example: 3
                    description: Customer rating for the service received during their booking
                  serviceRatingReasons:
                    type: array
                    items:
                      type: string
                      example: Professionalism
                    description: Rating factors chosen by the customer as contributors to their service rating
                  safetyRating:
                    type: integer
                    example: 4
                    description: Customer rating for the cleanliness and safety experienced during their booking
                  safetyRatingReasons:
                    type: array
                    items:
                      type: string
                      example: Cleanliness
                    description: Rating factors chosen by the customer as contributors to their cleanliness and safety rating
                  facilitiesRating:
                    type: integer
                    example: 3
                    description: Customer rating for the state of the facilities during their booking
                  facilitiesRatingReasons:
                    type: array
                    items:
                      type: string
                      example: FacilityAge
                    description: Rating factors chosen by the customer as contributors to their facilities rating
                  valueRating:
                    type: integer
                    example: 2
                    description: Customer rating for how valuable their experience was at the venue
                  valueRatingReasons:
                    type: array
                    items:
                      type: string
                      example: Variety
                    description: Rating factors chosen by the customer as contributors to their value rating
                  comments:
                    type: string
                    example: 'Kids had a great time, but the available parking was poor'
                    description: Comment provided by the customer in their GX Score response
                  actioned:
                    type: boolean
                    example: true
                    description: Internal status flag of the GX Score response used by Venue Manager users to flag responses as "actioned"
                  actionComments:
                    type: string
                    example: Contacted the customer and informed them of parking around the corner
                    description: Internal note recorded against the response provided by a Venue Manager user
                  actionedByStaffId:
                    type: string
                    example: '90221'
                    description: 'Unique ID for the staff member who most recently updated the actioned field, or the actionComments field'
                  actionedDate:
                    type: string
                    example: '2022-07-18T01:25:23Z'
                    description: 'Local date and time for when the actioned field, or the actionComments field was most recently updated'
                  createdDate:
                    type: string
                    format: date-time
                    example: '2022-07-14T01:25:23Z'
                    description: 'Local date and time for when the GX Score survey was emailed to the customer, or when the customer first accessed the QR code or URL link to commence a GX Score survey'
                  modifiedDate:
                    type: string
                    format: date-time
                    example: '2022-07-14T01:25:23Z'
                    description: Local date and time for when the GX Score response was most recently updated from the customer
              examples:
                Example:
                  value:
                    gxsResponseId: '70182'
                    customerId: '49043110'
                    bookingReference: '80821183'
                    isFan: true
                    isCritic: false
                    overallRating: 4
                    serviceRating: 3
                    serviceRatingReasons:
                      - Professionalism
                      - Consideration
                    safetyRating: 3
                    safetyRatingReasons:
                      - Cleanliness
                      - Hygiene
                    facilitiesRating: 2
                    facilitiesRatingReasons:
                      - FacilityAge
                      - Maintenance
                    valueRating: 4
                    valueRatingReasons:
                      - Variety
                      - FamilyFriendly
                    comments: 'Kids had a great time, but the available parking was poor'
                    actioned: true
                    actionComments: Contacted the customer and informed them of parking around the corner
                    actionedByStaffId: '90221'
                    actionedDate: '2022-07-18T01:25:23Z'
                    createdDate: '2022-07-14T01:25:23Z'
                    modifiedDate: '2022-07-14T01:25:23Z'
      operationId: get-gx-score-responses
  /data/attendances:
    get:
      tags:
        - Customers
      summary: Get attendance
      description: "Returns attendance records for guests based on attendance date.\r\n\r\n> * Attendance is recorded when a booking item is redeemed\r\n> * **Stock** and **addon** type products are not included\r\n"
      parameters:
        - name: startDate
          in: query
          description: The date (yyyy-mm-dd) you need data for
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-29'
        - name: endDate
          in: query
          description: Should be +1 day from the startDate
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-30'
        - name: pageNumber
          in: query
          description: 'Optional, default value = 1'
          required: false
          schema:
            type: integer
            example: 1
        - name: pageSize
          in: query
          description: 'Optional, default value = 100'
          required: false
          schema:
            type: integer
            example: 100
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  receiptNumber:
                    type: string
                    description: Unique identifier for a booking
                    example: '7314557'
                  bookingReference:
                    type: string
                    description: Unique identifier for a booking
                    example: '7314557'
                  checkInDateTime:
                    type: string
                    description: Date/time of the attendance
                    example: '2020-01-01T19:25:00Z'
                  productId:
                    type: string
                    description: Unique identifier of the product being checked in
                    example: '1156321'
                  parentProductId:
                    type: string
                    description: Unique identifier of the parent product being checked in
                    example: '1156320'
                  productName:
                    type: string
                    description: Name of the product being checked in
                    example: General Admission
                  bookingItemPartId:
                    type: string
                    description: Unique identifier for a ticket
                    example: '190227361'
                  sessionStart:
                    type: string
                    description: Start time of the ticket if applicable
                    example: '13:00'
                  sessionEnd:
                    type: string
                    description: End time of the ticket if applicable
                    example: '14:30'
                  customerId:
                    type: string
                    description: Unique identifier of the customer linked to the specific ticket
                    example: '100284772'
                  bookingCustomerId:
                    type: string
                    description: Unique identifier of the customer linked to the booking
                    example: '288192001'
                  locationIds:
                    type: array
                    description: Locations the ticket operates in the venue
                    items:
                      type: string
                      example: '1099211'
                  employeeId:
                    type: string
                    description: The identifier of the staff member who completed the check in
                    example: '29182'
              examples:
                Example:
                  value:
                    receiptNumber: '7314557'
                    bookingReference: '7314557'
                    checkInDateTime: '2020-01-01T19:25:00Z'
                    productId: '1156321'
                    parentProductId: '1156320'
                    productName: General Admission
                    bookingItemPartId: '190227361'
                    sessionStart: '13:00'
                    sessionEnd: '14:30'
                    customerId: '100284772'
                    bookingCustomerId: '288192001'
                    locationIds:
                      - '1099211'
                    employeeId: '29182'
      operationId: get-attendance
