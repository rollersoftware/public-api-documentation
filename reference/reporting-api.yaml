  /reporting/revenue-entries:
    get:
      tags:
        - Revenue
      summary: Get revenue entries
      description: |-
        Returns revenue entry data relating to funds received and recognised revenue.

        > `startDate` and `endDate` parameters are not based on **modified date**, they're based on the **entry date** of the record which may be different than the modified date of the booking.
      parameters:
        - name: startDate
          in: query
          description: The date (yyyy-mm-dd) you need data for
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-29'
        - name: endDate
          in: query
          description: Should be +1 day from the startDate
          required: true
          schema:
            type: string
            format: date
            example: '2020-07-30'
        - name: pageNumber
          in: query
          description: Optional. Specifies the page to return when multiple pages are available.
          required: false
          schema:
            type: integer
            default: 1
        - schema:
            type: string
            example: '934483, 934484'
          in: query
          name: bookingReferences
          description: Booking IDs in a comma separated value. Max limit is `100` references.
          allowEmptyValue: true
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  recordDate:
                    type: string
                    description: Date/time the revenue entry was recorded. Corresponding revenue figures should be recorded as being generated at this date/time
                    example: '2022-09-26T04:14:30Z'
                  entryType:
                    type: string
                    description: 'The type of revenue entry. This can be either Transaction, Recognition or Adjustment'
                    example: Transaction
                  bookingReference:
                    type: string
                    description: Unique identifier for a booking
                    example: '26654'
                  bookingLocation:
                    description: The sales channel where the booking was created
                    enum:
                      - Venue manager
                      - POS
                      - Online Checkout
                      - Self-serve kiosk
                      - Data import
                      - Recurring billing
                      - API
                      - Channel partners
                  productId:
                    type: string
                    description: Unique identifier of a product
                    example: '4331992'
                  productType:
                    type: string
                    description: 'Passes, Add-ons, Custom Products, Gift Cards, Package, Wallet'
                    example: Pass
                  unitCost:
                    type: number
                    description: The price of the ticket being referenced in the entry
                    example: 31.5
                  discount:
                    type: number
                    description: The value of the discount against a transaction entry
                    example: 0
                  discountCode:
                    type: string
                    description: The discount code used
                    example: NJJ89277112
                  ticketQuantity:
                    type: integer
                    description: 'Quantity of tickets sold in this entry, this can be used to determine the sales quantity for products. Can have negative values if items are removed from bookings.'
                    example: 5
                  redeemedQuantity:
                    type: integer
                    description: Quantity of tickets redeemed in this entry
                    example: 5
                  expiredQuantity:
                    type: integer
                    description: Quantity of tickets redeemed in this entry
                    example: 0
                  bookingItemId:
                    type: string
                    description: 'Unique identifier for an item within a booking. A booking can have multiple items, and items can have a quantity >1'
                    example: '29910292'
                  packageBookingItemId:
                    type: string
                    description: Unique identifier for the related package booking item (if any)
                    example: '9384021'
                  transactionDate:
                    type: string
                    description: Date of the first transaction against a booking
                    example: '2019-02-12T01:52:04Z'
                  transactionLocation:
                    type: string
                    description: 'The sales channel the specific transaction was generated from. This is not necessarily the same as bookingLocation, which is where the booking was created'
                    example: POS
                  transactionValue:
                    type: number
                    description: The value of the amount paid against the booking that is being attributed to this entry
                    example: 12.5
                  fundsReceived:
                    type: number
                    description: The amount of money received for a transaction entry
                    example: 12.5
                  voucherFundsReceived:
                    type: number
                    description: 'Funds received from external voucher programs, such as Groupon or Redeam OTA channels'
                    example: 0
                  recognisedDiscount:
                    type: number
                    description: The value of the discount against a redemption or expiry entry
                    example: 14.55
                  taxPercent:
                    type: number
                    description: The tax percent against the product in this entry
                    example: 7
                  taxOnFundsReceived:
                    type: number
                    description: The amount of tax on funds received for a transaction entry
                    example: 0.88
                  feeTaxPercent:
                    type: number
                    description: The tax percent against the fees in this entry
                    example: 2.2
                  feeRevenue:
                    type: number
                    description: The amount of revenue from transaction fees for this entry
                    example: 1.33
                  taxPayable:
                    type: number
                    description: The amount of tax payable on recognised revenue for this entry
                    example: 2.5
                  netRevenue:
                    type: number
                    description: The after tax revenue generated for this entry
                    example: 11.63
                  paymentType:
                    type: string
                    description: The type of tender used for the transaction
                    example: Cash
                  bookingPaymentId:
                    type: string
                    description: Unique Identifier of a transaction
                    example: '102991002'
                  externalPaymentReference:
                    type: string
                    description: The unique payment identifier from the payment gateway - or gift card number for gift card payments
                    example: 21398JJDUW992
                  accountsReceivable:
                    type: number
                    description: The accounts receivable generated or removed for this entry
                    example: 0
                  deferredRevenue:
                    type: number
                    description: The deferred revenue generated or removed for this entry
                    example: -12.5
                  deferredRevenueOther:
                    type: number
                    description: 'The external deferred revenue generated or removed for this entry (used for integrations, eg. Groupon)'
                    example: 0
                  deferredRevenueGiftCards:
                    type: number
                    description: The giftcard deferred revenue generated or removed for this entry
                    example: 0
                  manualGiftCardAdjustment:
                    type: number
                    description: Manual gift card balance adjustments for this entry
                    example: 25
                  multiVenueGiftCardPayable:
                    type: string
                    description: Accounts payable for multi-venue gift card revenue
                  multiVenueGiftCardReceivable:
                    type: string
                    description: Accounts recievable for multi-venue gift card revenue
                  customerId:
                    type: string
                    description: Unique identifier of the booking holder for the booking
                    example: '54661723'
                  companyId:
                    type:
                      - integer
                      - 'null'
                    description: Unique identifier of the company linked as the booking holder for the booking
                    example: 27777
                  companyName:
                    type: string
                    description: Name of the company linked as the booking holder for the booking
                    example: ROLLER
              examples: {}
      operationId: get-revenue-entries
