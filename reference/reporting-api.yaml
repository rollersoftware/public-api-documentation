  /data/discounts:
    get:
      tags:
        - Venue Information
      summary: Get discounts
      description: '> Returns detail on all discounts offered. These are not records of discount codes applied / discount usage'
      parameters:
        - name: pageNumber
          in: query
          description: 'Optional, default value = 1'
          required: false
          schema:
            type: integer
            example: 1
        - name: pageSize
          in: query
          description: 'Optional, default value = 20000'
          required: false
          schema:
            type: integer
            example: 100
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  discountId:
                    type: string
                    description: Unique identifier of the discount
                    example: '29104'
                  name:
                    type: string
                    description: Discount name
                    example: Military Discount
                  codeGenerationMode:
                    type: string
                    description: "How discount codes are generated. \r\n\r\n* `FromTicketId` refers to codes generated via membership sales. "
                    enum:
                      - ManuallyEnter
                      - BatchUpload
                      - IssuedToProduct
                      - FromTicketId
                  amountOff:
                    type: number
                    description: Dollar amount off the product cost (can only have one option of either AmountOff or PercentOff)
                    example: 3.5
                  percentOff:
                    type: number
                    description: Percentage off the product cost (can only have one option of either AmountOff or PercentOff)
                    example: 4
                  maxApplicableAmount:
                    type: number
                    description: Maximum discount that can be applied to a booking using this discount
                    example: 50
                  productIds:
                    type: array
                    description: 'Products this discount is valid for. When none, the discount applies to all products'
                    items:
                      type: string
                      example: '1099211'
                  isSingleUseCode:
                    type: boolean
                    description: 'When true, a code for this discount can only be used once'
                    example: true
                  startDate:
                    type: string
                    description: First day the discount can be used
                    example: '2019-08-07T00:00:00Z'
                  endDate:
                    type: string
                    description: Last day the discount can be used
                    example: '2020-07-17T00:00:00Z'
                  bookingDateRestrictions:
                    type: object
                    description: A restriction on which days the discount can be used to book in for (assuming bookings must be made for specific dates)
                    properties:
                      dateRange:
                        type: object
                        properties:
                          startDate:
                            type: string
                            example: '2018-09-27'
                          endDate:
                            type: string
                            example: '2018-12-14'
                          days:
                            type: array
                            description: 'Monday = 1, Sunday = 7'
                            items:
                              type: string
                              example: '1,2,3'
                      from:
                        type: object
                        properties:
                          number:
                            type: integer
                            example: 10
                          type:
                            type: string
                            enum:
                              - Days
                              - Weeks
                              - Months
                            example: Days
                  usageLimits:
                    type: object
                    description: The usage limits for each code based on a defined usage type
                    properties:
                      numberOfUses:
                        type: integer
                        description: The number of times the discount can be used based on the restriction type
                        example: 5
                      type:
                        type: integer
                        description: '0 = Per code, 1 = Per user, 2 = For each selected product (regardless of quantity purchased), 3 = Across selected products (quantity purchased counts towards uses), 4 = Per code per day, 5 = Per code per week, 6 = Per code per month, 7 = Per code per year'
                        example: 0
                  bookingRule:
                    type: object
                    description: The usage limits for each code per booking
                    properties:
                      numberOfUses:
                        type: integer
                        example: 3
                      type:
                        type: integer
                        description: 1 = Across selected products (quantity purchased counts towards uses)
                        example: 1
                  codes:
                    type: array
                    description: The discount codes valid for this discount
                    items:
                      type: string
                      example: 1997AHT631
              examples:
                Example:
                  value:
                    discountId: '29104'
                    name: Military Discount
                    codeGenerationMode: ManuallyEnter
                    amountOff: 3.5
                    percentOff: 4
                    maxApplicableAmount: 50
                    productIds:
                      - '1099211'
                    isSingleUseCode: true
                    startDate: '2019-08-07T00:00:00Z'
                    endDate: '2020-07-17T00:00:00Z'
                    bookingDateRestrictions:
                      dateRange:
                        startDate: '2018-09-27'
                        endDate: '2018-12-14'
                        days:
                          - '1,2,3'
                      from:
                        number: 10
                        type: Days
                    usageLimits:
                      numberOfUses: 5
                      type: 0
                    bookingRule:
                      numberOfUses: 3
                      type: 1
                    codes:
                      - 1997AHT631
      operationId: get-discounts
