      description: |-
        Returns product information for a venue.
        > Changes in this data are not expected to change frequently. As such data must be cached and this endpoint used sparingly.
        > Detail includes when the product is offered, but calls should be made to [**get product availability**](https://docs.roller.app/docs/rest-api/efb9788ea3808) to determine if there's capacity on a given day.
      operationId: get-products
  /products/stock:
    post:
      summary: Create stock products
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ../models/UpdateProductStock.yaml
      operationId: create-stock
      x-stoplight:
        id: ubj2tlego6it3
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../models/CreateProductStock.yaml
      description: Create a stock product
    put:
      summary: Update stock products
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ../models/UpdateProductStock.yaml
      operationId: update-stock
      x-stoplight:
        id: 4tm9nigd46q92
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../models/UpdateProductStock.yaml
      description: "Update an existing stock product by editing details or creating new variations.\r\n\r\n> 1. Ensure all field values (Including those that aren't being updated) are in the request otherwise they will be overwritten to be empty\r\n> 2. To update an existing variation, the child/variation level `productId` is required.\r\n> 3. To create a new variation, the child/variation level `externalId` is required (with no `productId`)."
  '/products/stock/{parentProductId}/quantity':
    put:
      summary: Update stock quantity
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ../models/UpdateProductStock.yaml
      operationId: update-stock-quantity
      x-stoplight:
        id: 7r5npm6bhkbps
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: integer
                  x-stoplight:
                    id: lu0wlmjdzjds2
                  description: Unique `productId` of the child product
                  example: 245252
                quantity:
                  type:
                    - integer
                    - 'null'
                  x-stoplight:
                    id: cnafo39arptk3
                  description: The new quantity of the product
                  minimum: 0
                  format: int32
      x-internal: false
      description: "Update an existing stock product by editing the quantity.\r\n\r\n* Setting `quantity` to `null` will set the stock quantity to **unlimited**\r\n* `quantity` cannot be set to `null` if `parLevel` is not set to zero (`0`) \r\n"
    parameters:
      - $ref: '#/components/parameters/parentProductId'
  /capacity-reservation:
    post:
      tags:
        - Capacity Reservation
      summary: Validate and reserve capacity
      responses:
        '200':
          description: The unique capacity reservation Id
          content:
            application/json:
              schema:
                type: object
                properties:
                  uniqueId:
                    type: string
                    description: The unique capacity reservation Id
                    example: ffdae420-a912-4d93-9234-9faca5e6194f
        '409':
          description: Invalid Reservation
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: LocationFullyBooked
                        message:
                          type: string
                          description: Error message
                          example: 'Fully booked on 10 Aug, 9:00 AM'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  description: 'The products being purchased, known as booking items'
                  items:
                    $ref: ../models/BookingCreateItem.yaml
      description: |-
        > Validate and reserve capacity prior to creating a booking.
        > This endpoint is used to ensure there is no double booking of capacity within ROLLER.
      operationId: reserve-capacity
  '/capacity-reservation/{uniqueId}':
    delete:
      tags:
        - Capacity Reservation
      summary: Delete a capacity reservation
      responses:
        '200':
          description: Deleted successfully
        '400':
          description: Invalid request
      description: |-
        > Delete a capacity reservation.
        > Use this endpoint to clear out existing reserved capacity so other customers may book.
        > Capacity reservations that are not deleted will automatically expire after 10 minutes.
      operationId: delete-reservation
      x-stoplight:
        id: pj5d0034eqv68
    parameters:
      - $ref: '#/components/parameters/uniqueId'
  /capacity-reservation/block:
    post:
      tags:
        - Capacity Reservation
      summary: Block resource capacity
      responses:
        '200':
          description: The unique resource capacity block ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resourceCapacityBlockId:
                    type: integer
                    description: The unique resource capacity block ID
                    example: 5516
                    x-stoplight:
                      id: utg27iyymresl
        '409':
          description: "* Resource could not be found\r\n* Resource will go over available capacity\r\n* Resource already booked or blocked out "
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - resourceId
                - blockoutCapacity
                - date
              properties:
                resourceId:
                  type: integer
                  x-stoplight:
                    id: yk6j5fxgzjt3q
                  description: The ID of the resource being blocked
                blockoutCapacity:
                  type: integer
                  x-stoplight:
                    id: exsos71959mov
                  description: The total capacity to block out
                date:
                  type: string
                  x-stoplight:
                    id: pduy8nhj7lh43
                  format: date
                  description: The date of the capacity block (In ISO8601 date format only)
                startTime:
                  type: string
                  x-stoplight:
                    id: 30qn41dnul6ol
                  description: "Start time in 24h format \r\n\r\n* eg: 00:00 = 12:00 AM (Midnight)\r\n* eg: 23:59 = 11:59 PM\r\n\r\nRequired if `blockEntireDay` is `false`"
                endTime:
                  type: string
                  x-stoplight:
                    id: kf6lqei7qkhhb
                  description: "End time in 24h format \r\n\r\n* eg: 00:00 = 12:00 AM (Midnight)\r\n* eg: 23:59 = 11:59 PM\r\n\r\nRequired if `blockEntireDay` is `false`"
                blockEntireDay:
                  type: boolean
                  x-stoplight:
                    id: bzs0a224vok0n
                  description: Boolean indicating if the block applies to the entire day
                notes:
                  type: string
                  x-stoplight:
                    id: d980uvhbzszww
                  description: Additional notes or reason for the block
      description: '> Block capacity for the specified resource.'
      operationId: block-capacity
      x-stoplight:
        id: b50kcv6g4rn95
    get:
      summary: Search resource capacity blocks
      tags:
        - Capacity Reservation
      responses:
        '200':
          description: A list of resource capacity blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../models/ResourceCapacityBlock.yaml
                  x-stoplight:
                    id: ag5ndw9b6pmc0
      operationId: search-block-capacity
      x-stoplight:
        id: l05sayuiqmtk6
      description: '> Search for existing resource capacity blocks.'
      parameters:
        - in: query
          description: The optional date for which to retrieve capacity blocks in ISO8601 format (`yyyy-MM-dd`)
          name: date
          schema:
            example: '2025-07-14'
        - schema:
            type: string
            example: '30539'
          in: query
          name: resourceId
          description: The optional ID of the resource to filter by
  '/capacity-reservation/block/{blockId}':
    parameters:
      - $ref: '#/components/parameters/blockId'
    delete:
      summary: Delete resource capacity block
      tags:
        - Capacity Reservation
      responses:
        '200':
          description: Capacity block successfully deleted.
        '404':
          description: Resource capacity block not found.
      operationId: delete-block-capacity
      x-stoplight:
        id: nbs0n5tm0dirn
      description: '> Delete an existing resource capacity block.'
    get:
      summary: Get resource capacity block
