  parameters:
    uniqueId:
      name: uniqueId
      in: path
      schema:
        type: string
        example: 3c3aa180-bf44-4f0c-92a2-0cd120596014
      description: Unique ID of a booking
      required: true
    blockId:
      name: blockId
      in: path
      required: true
      schema:
        type: integer
        example: 5156
      description: The unique resource capacity block ID
    customerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        example: '32444'
      description: ID of a guest record (Deprecated) (Same as `guestId`)
      deprecated: true
    guestId:
      name: guestId
      in: path
      required: true
      schema:
        type: string
        example: '32444'
      description: 'ID of a guest record (Formerly `customerId`, which is equivalent) '
    webhookId:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
        example: '17'
      description: ID of a registered webhook
    discountId:
      name: discountId
      in: path
      required: true
      schema:
        type: integer
        example: 266
      description: Unique ID of a discount configuration
    parentProductId:
      name: parentProductId
      in: path
      required: true
      schema:
        type: string
        example: '153444'
      description: 'Unique `productId` of the parent product '
