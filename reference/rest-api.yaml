        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: ../models/Discount.yaml
      operationId: get-discount
      tags:
        - Discount
    put:
      summary: Update discount
      description: Updates a discount configuration for a given known discount ID
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../models/DiscountUpdate.yaml
      responses:
        '200':
          description: Successful response
      operationId: update-discount
      tags:
        - Discount
