                    items:
                      $ref: ../models/BookingBasicDetail.yaml
      operationId: search-for-bookings
      tags:
        - Booking Information
  /bookings/draft/costs:
    post:
      summary: Get booking costs
      responses:
        '200':
          description: Bookings Costs
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookingCosts:
                    type: object
                    properties:
                      subTotal:
                        type: number
                        description: Subtotal cost of all booking items
                        example: 22
                      amountOwing:
                        type: number
                        description: The amount currently owing on the booking
                        example: 21.87
                      discount:
                        type: number
                        description: Total amount of discounts on the booking (discounts are already factored into booking totals).
                        example: 2.2
                      subTotalTax:
                        type: number
                        description: Total amount of tax on subtotal
                        example: 1.8
                      feeTax:
                        type: number
                        description: Total amount of tax on fees
                        example: 0.19
                      tax:
                        type: number
                        description: Total amount of tax
                        example: 1.99
                      taxExclusive:
                        type: number
                        description: The value of items in the booking which have tax exclusive prices
                        example: 0
                      transactionFee:
                        type: number
                        description: Total transaction fees on the booking
                        example: 1.43
                      cardFee:
                        type: number
                        description: Credit card fees on the booking
                        example: 0.64
                      fees:
                        type: number
                        description: Total Fees (Service Fees) (i.e. Transaction Fees + Card Fees)
                        example: 2.07
                      totalExcludingFees:
                        type: number
                        description: Total booking cost excluding fees payable by the customer
                        example: 19.8
                      total:
                        type: number
                        description: Total booking cost including taxes and fees
                        example: 21.87
                      totalIgnoringDeposit:
                        type: number
                        description: Total booking cost ignoring any deposit amount payable
                        example: 21.87
                  discounts:
                    type: array
                    items:
                      type: object
                      properties:
                        discount:
                          type: number
                          description: discount amounts for this discount code
                          example: 2.2
                        code:
                          type: string
                          description: Discount code used on the booking
                          example: AN829910
                  discounteditems:
                    type: array
                    items:
                      type: object
                      properties:
                        itemNumber:
                          type: string
                          description: Unique reference for the specific discounted item in the booking
                          example: c7585bf9-cdbe-433a-8ab9-a4260d9ebbca
                        discount:
                          type: number
                          description: Value of the discount against this specific item
                          example: 2.2
                  giftCards:
                    type: array
                    items:
                      type: object
                      properties:
                        giftCardNumber:
                          type: string
                          description: Gift Card number being redeemed
                          example: '8839920172'
                        amountDeducuted:
                          type: number
                          description: Dollar value being deducted from the gift card when this booking is published
                          example: 20
                  giftCardErrors:
                    type: array
                    items:
                      type: string
                      description: Error message/s for gift card/s redeemed
                      example: Could not find giftcard for number 8839920172
        '409':
          description: Invalid Booking
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: VenueCapacity
                        message:
                          type: string
                          description: Error message
                          example: Venue capacity will be exceeded
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - externalId
                - customer
                - items
              properties:
                externalId:
                  type: string
                  description: 3rd party booking reference
                  example: UJJSK28374
                  maxLength: 64
                name:
                  type: string
                  description: Title of the booking. Name can be different to the booking owner name (defaults to the booking owner's name if not specified)
                  example: Sports Group Booking
                  maxLength: 128
                comments:
                  type: string
                  description: Additional detail about the booking
                  example: Customer has not visited before
                  maxLength: 500
                purchaseDate:
                  type:
                    - string
                    - 'null'
                  description: Optionally provide the creation datetime in UTC - generally used when re-creating bookings and needing to retain the original datetime
                  example: '2020-07-29T06:57:18.5306035+00:00'
                capacityReservationId:
                  type:
                    - string
                    - 'null'
                  description: The GUID returned from the capacity reservation API - it's recommended to use the capacity reservation API otherwise the request may be rejected
                  example: c07128c8-adb1-45a0-9241-dc3875518468
                companyId:
                  type:
                    - integer
                    - 'null'
                  description: Id of the company making the booking
                  example: 12345
                customer:
                  $ref: ../models/BookingCreateCustomer.yaml
                items:
                  type: array
                  items:
                    $ref: ../models/BookingCreateItem.yaml
                payments:
                  type: object
                  description: 'The initial payments for the booking (the booking can be unpaid, partially paid or fully paid)'
                  properties:
                    id:
                      type: string
                      maxLength: 32
                      description: Payment or transaction Id
                    paymentType:
                      description: The payment type
                      enum:
                        - ''
                        - CreditCard
                        - CreditCardPreAuth
                        - Cash
                        - Cheque
                        - BankTransfer
                        - Other
                    amount:
                      type: number
                      description: Total payment including fees in the venue's currency
                    creditCardFees:
                      type: number
                      description: Credit card fees associated with the payment
                    transactionFees:
                      type: number
                      description: Transaction or product fees associated with the payment (do not include credit card fees)
                discounts:
                  type: array
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        description: Discount code being used on the booking (can apply multiple)
                        example: AN829910
                giftCards:
                  type: array
                  items:
                    type: object
                    properties:
                      giftCardNumber:
                        type: string
                        description: Discount code being used on the booking (can apply multiple)
                        example: '8839920172'
                sendConfirmations:
                  type: boolean
                  description: When true ROLLER will send the booking confirmation / tickets to the customer automatically
                  example: false
                customerPaysFees:
                  type: boolean
                  description: When true fees setup in ROLLER are applied. Please note if manual `creditCardFees` are provided in the request it will override all fees setup in ROLLER.
                  example: false
                  default: false
        description: ''
      description: '> Provide a draft booking request and receive associated booking cost information. This will not actually create a draft booking, only provide relevant booking costs.'
      operationId: get-booking-costs
      tags:
        - Transaction
