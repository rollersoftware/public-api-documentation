  /discounts/validate:
    post:
      summary: Validate discount codes
      responses:
        '200':
          description: Discount validation
          content:
            application/json:
              schema:
                type: object
                properties:
                  discounts:
                    description: Discounts applied
                    type: array
                    items:
                      type: object
                      properties:
                        discount:
                          type: number
                          description: Amount discounted
                          example: 22.5
                        code:
                          type: string
                          description: Discount code used
                          example: '123456789'
                        validationMessage:
                          type: string
                          description: Reason discount was not applied (only present if discount not valid)
                          example: Discount is not valid for this transaction
                  items:
                    type: array
                    description: Items validated against the discount
                    items:
                      type: object
                      properties:
                        itemNumber:
                          type: string
                          description: 'Identifier for this item in the booking. Can be provided in validation request, if not, ROLLER will return a unique ID'
                          example: 0a2c56ea-80a3-4abc-aef9-47a0b90f9503
                        discount:
                          type: number
                          description: Amount discounted on this item
                          example: 22.5
                  bookingCosts:
                    type: object
                    properties:
                      total:
                        type: number
                        description: 'Total value of the booking including tax, and factoring in discounts'
                        example: 27.5
                      totalIgnoringDeposit:
                        type: number
                        description: Total value of the booking excluding any deposit amount owing
                        example: 27.5
                      totalExcludingFees:
                        type: number
                        description: Total value of the booking excluding any booking fees
                        example: 26
                      amountOwing:
                        type: number
                        description: Amount currently owing on the booking total
                        example: 27.5
                      tax:
                        type: number
                        description: Total tax amount on the booking total
                        example: 2.75
                      taxExclusive:
                        type: number
                        description: Amount of tax that is on top of the product price (included in total tax number)
                        example: 0
                      transactionFee:
                        type: number
                        description: Amount of transaction fees on the booking
                        example: 0
                      cardFee:
                        type: number
                        description: Amount of credit card fees on the booking
                        example: 0
                      discount:
                        type: number
                        description: Amount of discount on the booking
                        example: 22.5
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                        description: Product ID of an item in the booking
                      quantity:
                        type: integer
                        description: Quantity of that product in the booking
                      bookingDate:
                        type: string
                        description: Date that the booking is for (NOT the date the booking is being made)
                      priceOverride:
                        type: number
                        description: 'Price per quantity of the item (if left blank, uses default price)'
                      discounts:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                              description: The discount code being applied (you can use multiple)
      description: |-
        <!-- theme: warning-->

        > #### This endpoint is being deprecated
        > Please use the [**booking costs endpoint**](#/paths/~1bookings~1draft~1costs/post) to validate discounts instead.

        > Validate whether a discount code is valid and the value of that discount against products in ROLLER.
        > You can send a request with multiple products, quantities and discount codes, and you will receive the specific discounted amounts against each item, as well as the booking totals
      operationId: validate-discount-codes
      deprecated: true
      tags:
        - Discount
  '/bookings/{uniqueId}':
    put:
      summary: Update a booking
      responses:
        '200':
          description: Success
        '409':
          description: Invalid Booking
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: VenueCapacity
                        message:
                          type: string
                          description: Error message
                          example: Venue capacity will be exceeded
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Title of the booking. Name can be different to the booking owner name (defaults to the booking owner's name if not specified)
                  example: Sports Group Booking
                  maxLength: 128
                comments:
                  type: string
                  description: Additional detail about the booking
                  example: Customer has not visited before
                  maxLength: 500
                metadata:
                  type: object
                  description: 'User-defined key-value pairs to update on the booking. Uses merge semantics — keys present in this object are set or updated, keys absent from the object are left unchanged. Set a key''s value to `null` to remove it. Supports up to 20 entries. Keys are case-sensitive strings (max 40 characters). Values are strings (max 500 characters, HTML stripped on write).'
                  additionalProperties:
                    type:
                      - string
                      - 'null'
                  example:
                    reservationSource: partner-portal
                    groupId: null
                newItems:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: integer
                        description: Variation ID (Child Product ID) of the product being added
                        example: 12345679
                      quantity:
                        type: integer
                        description: The number of products / items being purchased. The number of tickets generated is Quantity * Product.GroupSize
                        example: 5
                      bookingDate:
                        type: string
                        description: The date when the product / event is occurring - depending on the product configuration this may just be the date of the booking where the booking is valid until X time in the future. ISO8601 date format only e.g. 2020-03-21
                        example: '2020-07-29'
                      startTime:
                        type: string
                        description: 'Session start time in 24h format e.g. 00:00 = Midnight, 23:59 = 11:59 PM'
                        example: '14:00'
                      priceOverride:
                        type: number
                        description: Use this when the price you're charging is not the same as the product price in ROLLER
                        example: 23.8
                      packageInclusions:
                        type: array
                        description: Define which Party Package inclusions have been selected by the guest
                        items:
                          type: object
                          properties:
                            productId:
                              type: string
                              description: Variation ID (Child Product ID) of the product selected as an inclusion
                              example: '9817726'
                            quantity:
                              type: integer
                              description: The quantity of the selected inclusion
                              example: 2
                      tickets:
                        type: array
                        description: Optionally provide ticket details - the number of tickets must match Quantity * Product.GroupSize
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Custom ticket ID. When not supplied the default is `<BookingId>-<TicketId>`
                              example: 277AHU7610
                            name:
                              type: string
                              description: The name of the ticket holder
                              example: John Smith
                idsToRemove:
                  type: array
                  description: The `bookingItemId`'s of the items to remove from the booking
                  items:
                    type: integer
                    example: 23423882
                itemsToUpdate:
                  type: array
                  description: List of booking items that can have additional fields updated
                  items:
                    type: object
                    required:
                      - bookingItemId
                    properties:
                      bookingItemId:
                        type: string
                        description: The `bookingItemId` of the booking item within the booking to update. This is not the `ticketId`.
                        example: '2837466571'
                      bookingEndDate:
                        type:
                          - string
                          - 'null'
                        description: 'The new date for when the booking item is to expire, in the format: `yyyy-MM-dd`'
                        example: '2025-07-14'
                      tickets:
                        type: array
                        description: List of tickets that can have additional fields updated
                        items:
                          type: object
                          properties:
                            ticketId:
                              type: string
                              description: The ID of the ticket within the booking item to update data for.
                              example: 92837746-42383746
                            customTicketId:
                              type: string
                              description: "The new custom ticket ID for the ticket.\r\n\r\n- Note this will override any existing `customTicketId`.\r\n- Provide an empty string to remove any existing `customTicketId`.\r\n- Validation to prevent duplicate `customTicketId`'s is only available when creating bookings (Duplicates are allowed when updating)."
                              example: wristband_0122
                              maxLength: 32
                            name:
                              type: string
                              description: "The name of the ticket holder.\r\n\r\n- Provide an empty string to remove the existing `name`.\r\n- `NULL`values are ignored; no changes will be made to the existing name."
                              example: John Smith
                              maxLength: 50
        description: ''
      description: '> Update booking details or add/remove items from a booking.'
      operationId: update-a-booking
      tags:
        - Booking Management
    delete:
      summary: Delete a booking
      responses:
        '200':
          description: Deleted successfully
      description: "Delete a booking, along with all associated transaction records.\r\n\r\n> * You can only delete bookings you've made via the API\r\n> * You can only delete future bookings\r\n> * Cancelled bookings cannot be deleted\r\n> * All records of the booking will be deleted from all ROLLER reports"
      operationId: delete-a-booking
      tags:
        - Booking Management
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comments:
                  type: string
                  description: Optionally provide a reason for deleting the booking
    get:
      summary: Get booking detail
      description: "Returns detail of a specific booking based on the booking.\r\n\r\n> `bookingReference` (i.e. the ROLLER `bookingId`) can be used instead of `uniqueId` as the path parameter."
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: ../models/BookingDetail.yaml
        '404':
          description: Booking not found
      operationId: get-booking-detail
      tags:
        - Booking Information
    parameters:
      - $ref: '#/components/parameters/uniqueId'
  '/bookings/{uniqueId}/cancel':
    post:
      summary: Cancel a booking
      responses:
        '200':
          description: Success
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
                example: You can only cancel bookings you've made via the API
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - issueRefund
              properties:
                issueRefund:
                  type: boolean
                  description: Determines if any booking payments are refunded
                  default: true
                refundType:
                  description: The method of payment refund (Required when `issueRefund` is `true`)
                  enum:
                    - CreditCard
                    - Cash
                    - Eftpos
                    - Cheque
                    - BankTransfer
                    - GiftCard
                    - Other
                refundTransactionId:
                  type: string
                  description: Optional transaction ID of the refund (Only relevant when `issueRefund` is `true`)
                  example: UUDJS882993
                  maxLength: 32
                refundTransactionDate:
                  type:
                    - string
                    - 'null'
                  description: Optional datetime in UTC of the refund transaction (Only relevant when `issueRefund` is `true`)
                  example: '2020-07-30T09:03:06.4749865+00:00'
                comments:
                  type: string
                  description: Optional comments to add against the refund in booking activity (Only relevant when `issueRefund` is `true`)
                  example: Customer called and cancelled their booking.
        description: ''
      description: |
        Cancel a booking, and optionally mark it as refunded in a single transaction.
        > * Only bookings created via API can be cancelled via API
        > * You can only cancel future bookings
        > * Cancelled bookings will still be visible in some pages in VM
        > * Any associated payment records will still be present for cancelled bookings
        > * Refunds must be processed externally of ROLLER - Only a record of the refund can be added via API.
      operationId: cancel-a-booking
      tags:
        - Booking Management
    parameters:
      - $ref: '#/components/parameters/uniqueId'
  '/bookings/{uniqueId}/payments':
    post:
      summary: Add transaction record
      description: |
        * Add a transaction record (Such as a **payment** or **refund**) to an existing booking in ROLLER.
        * Payments must be processed externally of ROLLER, only a record of a successful transaction can be created via the API.

        <!-- theme: warning -->
        > #### When processing refunds 
        > * Ensure you do not refund more than the amount already paid on the booking
        > * This only affects the record in ROLLER and does not actually refund the guest. The refund must still be actioned separately (for example refunded via your payment gateway).
      responses:
        '200':
          description: Booking detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  uniqueId:
                    type: string
                    description: Unique Payment ID
                    example: ffdae420-a912-4d93-9234-9faca5e6194f
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: Booking
                        message:
                          type: string
                          description: Error message
                          example: Booking 'ffdae420-a912-4d93-9234-9faca5e6194f' not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - paymentType
                - amount
              properties:
                id:
                  type: string
                  description: Unique payment or transaction ID. This must be unique otherwise the payment record will not be added.
                  example: HYA728830013
                paymentType:
                  type: string
                  enum:
                    - CreditCard
                    - CreditCardPreAuth
                    - Cash
                    - Cheque
                    - BankTransfer
                    - Other
                  description: The tender type used
                  example: CreditCard
                amount:
                  type: number
                  description: "The payment total including fees, in venue local currency. Use a negative amount for refunds. \r\n"
                  example: 25.5
                creditCardFees:
                  type: number
                  description: Credit card fees associated with the payment
                  example: 1.5
                transactionDate:
                  type: string
                  description: Optionally provide the transaction datetime in UTC - generally used when re-creating bookings and needing to retain the original datetime
                  example: '2020-07-29T06:57:18.5326035+00:00'
      operationId: add-transaction-record
      tags:
        - Transaction
    parameters:
      - $ref: '#/components/parameters/uniqueId'
  '/bookings/{uniqueId}/payments/links':
    post:
      summary: Create payment link
      description: "Create a payment link to send to a recipient email or phone (via SMS) to take payment.\r\n\r\nTo see delivery status of the payment link, please see the activity log on the relevant booking in VM.\r\n\r\n* Payment links **can** be generated for bookings created via both API, and via ROLLER applications.\r\n* Payment links **cannot** be created for API-draft, or venue-draft bookings.\r\n\r\nNote: If both `email` and `phone` is provided, `email` will be ignored and an SMS will be sent.\r\nNote: Sending payment links to a recipient `phone` (via SMS) is unsupported in **Playground**.  \r\n<!-- theme: warning-->\r\n> This will not create a guest record of the recipient, or attach them to the booking in VM.\r\n"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Payment link ID
                    example: '2566'
                  url:
                    type: string
                    description: Payment link URL
                    example: 'https://...'
        '400':
          description: 'Bad Request - Validation issue (eg: Email or phone is required).'
        '404':
          description: Not Found - No booking found for `uniqueIdentifier`
        '409':
          description: 'Conflict - Business rule (eg: Booking already paid, or payment link requests more than current owing amount).'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - email
                - phone
              properties:
                amount:
                  type: number
                  description: Amount payable via the payment link
                  example: 32.2
                email:
                  type: string
                  description: Recipient email (Not required if `phone` is provided)
                  example: finn.mertons@roller.com
                phone:
                  type: string
                  description: Recipient phone (Not required if `email` is provided)
                  example: '0497911898'
      operationId: create-payment-link
      tags:
        - Transaction
      x-internal: false
    parameters:
      - $ref: '#/components/parameters/uniqueId'
  '/bookings/{uniqueId}/payments/links/{paymentLinkId}':
    parameters:
      - $ref: '#/components/parameters/uniqueId'
