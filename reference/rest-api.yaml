# Stoplight published URL: https://docs.roller.app/docs/api/rest
openapi: 3.1.0
info:
  title: REST API
  version: 1.0.0
  description: ''
  contact:
    name: ROLLER Help Centre
    url: 'https://mysupport.roller.software/'
  termsOfService: 'https://www.roller.software/terms'
servers:
  - description: Production
    url: 'https://api.roller.app'
  - url: 'https://api.play.roller.app'
    description: Playground (Test Environment)
tags:
  - name: Booking Information
    description: Search for bookings and retrieve the detail of a single booking.
  - name: Booking Management
    description: 'Create, update, cancel, and delete bookings, including draft bookings.'
  - name: Capacity Reservation
    description: 'Reserve and release product capacity, and manage resource capacity blocks.'
  - name: Discount
    description: 'Create, retrieve, and update discounts, and manage discount codes.'
  - name: Gift Card
    description: Create gift cards and check gift card balances.
  - name: Guest
    description: 'Retrieve and update guest records, multi-passes, and signed waivers.'
  - name: Product
    description: 'Retrieve product availability and product detail, and manage stock products.'
  - name: Redemption
    description: Redeem tickets against a booking.
  - name: Staff
    description: 'Create, retrieve, update, and delete staff accounts. Lock, unlock, and send email invitations to staff members.'
  - name: Transaction
    description: 'Record payments and refunds against bookings, calculate booking costs, and manage payment links.'
  - name: Venue Information
    description: Retrieve detail about the authenticated venue.
  - name: Webhooks
    description: Webhooks
paths:
  /product-availability:
    get:
      tags:
        - Product
      summary: Get product availability
      description: |-
        Returns products available for a specific date. This includes capacity and session time information where supported.

        > Availability depends on a number of factors:
        > * **Dates** defined on the product, **times** defined in **schedules**, and **exclusion periods**
        > * **Sale periods**, including **cut-off settings**
        > * Capacity, which may be fixed/unlimited **quantity** or depend on **resource** settings
        > * What the **product type** is, such as stock, session or party package
        > * ...And other settings like `Hide from online sales`
        > For more information on availability, please see our [**help centre**](https://mysupport.roller.software/hc/en-us/articles/6442667452431-Why-is-a-standard-pass-not-available-in-my-online-checkout).
      parameters:
        - name: Date
          in: query
          description: The date (yyyy-MM-dd) availability is needed for
          required: true
          schema:
            type: string
            example: '2025-07-14'
            format: date
          allowReserved: false
        - name: ProductCategory
          in: query
          description: Optional filter to get availability only for products in this product category
          schema:
            type: string
            example: Merchandise
        - name: ProductIds
          in: query
          description: Optional filter to get availability only for the parent product IDs in this comma separated list
          schema:
            type: string
            example: '107392,107399,107412'
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    parentProductId:
                      type: string
                      example: '107399'
                      description: Parent product ID
                    parentProductName:
                      type: string
                      description: Parent product name
                      maxLength: 75
                      example: Season Pass
                    type:
                      $ref: ../models/ProductType.yaml
                    description:
                      type: string
                      description: Brief description of the product
                      maxLength: 150
                      example: Grants entry for the entire summer season
                    imageUrl:
                      type: string
                      description: Product image URL
                      example: 'https://someimage.com/10002'
                    products:
                      type: array
                      items:
                        $ref: ../models/ProductInfo.yaml
                    availabilities:
                      type: array
                      items:
                        $ref: ../models/ProductAvailability.yaml
                    sessions:
                      type: array
                      items:
                        $ref: ../models/ProductSession.yaml
                    id:
                      type: string
                      description: Product ID (This has been replaced by `parentProductId`)
                      example: '107399'
                      deprecated: true
                    name:
                      type: string
                      description: Product name (This has been replaced by `parentProductName`)
                      maxLength: 75
                      example: Season Pass
                      deprecated: true
      operationId: get-product-availability
  /product-availability/calendar:
    get:
      tags:
        - Product
      summary: Get product availability calendar
      description: |-
        Returns the availability status for each day in a given month for a single product. Designed for use in date picker and calendar UIs in third-party checkouts, allowing guests to see at a glance which dates have availability before selecting a specific date.

        Once the guest has selected a date, call [**Get product availability**](#/paths/~1product-availability/get) to retrieve session-level detail and capacity for that date.

        > Response data is cached for 1 minute and is invalidated when a new booking is created.
      operationId: get-product-availability-calendar
      parameters:
        - name: productId
          in: query
          required: true
          description: The ID of the product to retrieve calendar availability for
          schema:
            type: integer
            example: 107399
        - name: date
          in: query
          required: true
          description: 'The month to retrieve availability for, in `YYYY-MM` format'
          schema:
            type: string
            example: 2026-07
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: array
                description: One entry for each day in the requested month
                items:
                  $ref: ../models/ProductAvailabilityCalendarDay.yaml
        '404':
          description: Product not found
  /products:
    get:
      tags:
        - Product
      summary: Get product detail
      parameters:
        - name: ProductCategory
          in: query
          description: Optional filter to get availability only for products in this product category
          schema:
            type: string
            example: Merchandise
        - schema:
            type: string
            example: Pass
          in: query
          name: productType
          description: 'Optionally filter by product type. See [**product type mapping**](../docs/resources/product-type-mapping.md).'
        - schema:
            type: string
            example: Membership
          in: query
          name: productSubType
          description: 'Optionally filter by product sub type. See [**product type mapping**](../docs/resources/product-type-mapping.md).'
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    parentProductId:
                      type: string
                      example: '107399'
                      maxLength: 150
                      description: Parent product ID
                    parentProductName:
                      type: string
                      example: Season Pass
                      maxLength: 75
                      description: Parent product name
                    type:
                      $ref: ../models/ProductType.yaml
                    products:
                      type: array
                      items:
                        $ref: ../models/SaleProduct.yaml
                    shortDescription:
                      type: string
                      description: Brief description of the product
                      example: Grants entry for the entire summer season
                      maxLength: 150
                    description:
                      type: string
                      description: Longer form product description
                      example: 'Grants entry for the entire summer season. Access includes all rides, events, and 1 free drink per guest per day'
                      maxLength: 4000
                    imageUrl:
                      type: string
                      description: Product image URL
                      example: 'https://someimage.com/10002'
                    termsAndConditionsText:
                      type: string
                      description: Custom terms and conditions for the parent product
                      example: All participants must follow staff instructions at all times.
                    addOns:
                      type: array
                      description: The add-on product IDs linked to this product
                      items:
                        type: string
                        description: Product IDs of add on/stock products which are to be offered as up sells when purchasing this product
                        example: '107383'
                    validDays:
                      type:
                        - integer
                        - 'null'
                      description: The number of days a pass is valid from date of purchase
                      example: 90
                    validDaysFromRedemption:
                      type:
                        - integer
                        - 'null'
                      description: The number of days a pass is valid from date of redemption
                      example: 1
                    restrictedAddOns:
                      type: array
                      description: The restricted add-ons linked to this product
                      items:
                        type: object
                        properties:
                          stockPeriodId:
                            type: integer
                          addOns:
                            type: array
                            items:
                              type: string
                          days:
                            type: array
                            items:
                              type: object
                              properties:
                                closed:
                                  type: boolean
                                timeRanges:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      startTime:
                                        type: string
                                        format: time
                                      endTime:
                                        type: string
                                        format: time
                    formIds:
                      type: array
                      description: The form IDs linked to this product
                      items:
                        type: string
                        example: d4ad7af49a9b435
                    tags:
                      type: array
                      description: Tags associated with this product
                      items:
                        type: string
                        description: Product IDs of add on/stock products which are to be offered as up sells when purchasing this product
                        example: '"Admission"'
                    minPurchase:
                      type: integer
                      example: 1
                      description: Minimum product purchase
                    pricingRuleId:
                      type:
                        - string
                        - 'null'
                      format: uuid
                      description: 'Pricing rule identifier that links the product to a custom pricing rule, for session pass type products.'
                      example: 22f29d68-1c94-4de2-b616-020108d92a06
                    depositPercentage:
                      type: number
                      description: The minimum percentage of the product cost required for purchase. Only one of `depositPercentage` or `depositAmount` should be used.
                      example: 25
                    depositAmount:
                      type: number
                      description: The minimum amount required for purchase. Only one of `depositPercentage` or `depositAmount` should be used.
                      example: 12
                    modifiers:
                      type: array
                      description: The booking cost modifier IDs linked to this product
                      items:
                        type: string
                        description: Product IDs of linked modifiers that can optionally be added to this product
                        example: 988835b8-d64e-4369-96cb-caaa20a7396c
                    modifierGroups:
                      type: array
                      description: The booking cost modifier groups linked to this product
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          isRequired:
                            type: boolean
                          isSingleChoice:
                            type: boolean
                          isOpenQuantity:
                            type: boolean
                          displayName:
                            type: string
                          modifiers:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                amount:
                                  type:
                                    - number
                                    - 'null'
                                percentage:
                                  type:
                                    - number
                                    - 'null'
                                name:
                                  type: string
                                description:
                                  type: string
                                termsAndConditions:
                                  type: string
                                imageUrl:
                                  type: string
                                isRequiredForOnlinePurchase:
                                  type: boolean
                                isDefault:
                                  type: boolean
                                defaultQuantity:
                                  type: string
                                  example: '2'
                    giftcard:
                      type: object
                      description: Configuration detail for gift card products
                      properties:
                        canSendDigital:
                          type: boolean
                        canSendPhysical:
                          type: boolean
                        supportsVideoMessage:
                          type: boolean
                        supportsWrittenMessage:
                          type: boolean
                        pickupAvailable:
                          type:
                            - boolean
                            - 'null'
                        messagingOptionLimit:
                          type:
                            - integer
                            - 'null'
                        pickupDescription:
                          type: string
                        productPostages:
                          type: array
                          items:
                            type: object
                            properties:
                              productPostageId:
                                type: string
                              type:
                                type: string
                              price:
                                type: number
                              description:
                                type: string
                    partyDetails:
                      type: object
                      description: Configuration for additional party details to be captured in progressive checkouts for party package type products
                      properties:
                        partyNamePrompt:
                          type: string
                          description: Phrase used to request party name when a party package type product is being purchased via progressive checkouts
                          example: Please provide a name that describes your party and includes the guest of honour
                        guestListEnabled:
                          type: boolean
                          description: Whether guest list feature is enabled. Requires that `partyNamePrompt` is used.
                    agreement:
                      type: object
                      description: Determines the booking agreement the guest needs to sign for this product
                      properties:
                        bookingAgreementId:
                          type: integer
                          example: 4
                          description: Booking agreement ID
                        formIdentifier:
                          type: string
                          example: d4ad7af49a9b435
                          description: Form ID
                    isWaiverRequired:
                      type: boolean
                      description: Determines whether the guest needs to sign a waiver for this product
                    captureTicketHolderName:
                      type: boolean
                      description: Whether names of each ticket holder are requested when items are purchased via progressive checkouts
                    duration:
                      type:
                        - integer
                        - 'null'
                      description: Duration of the time-based product in minutes
                      example: 90
                    durationType:
                      enum:
                        - PerSession
                        - PerGuest
                      description: Determines whether duration is based on session or guest count
                    meta:
                      type: array
                      description: Meta values for the product
                      items:
                        type: object
                        additionalProperties:
                          type: string
                          example: value
                    id:
                      type: string
                      description: Product ID (This has been replaced by `parentProductId`)
                      example: '107399'
                      deprecated: true
                    name:
                      type: string
                      description: Product name (This has been replaced by `parentProductName`)
                      example: Season Pass
                      maxLength: 75
                      deprecated: true
      description: |-
        Returns product information for a venue.
        > Changes in this data are not expected to change frequently. As such data must be cached and this endpoint used sparingly.
        > Detail includes when the product is offered, but calls should be made to [**get product availability**](#/paths/~1product-availability/get) to determine if there's capacity on a given day.
      operationId: get-product-detail
  /products/stock:
    post:
      summary: Create stock products
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ../models/UpdateProductStock.yaml
      operationId: create-stock-products
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../models/CreateProductStock.yaml
      description: Create a stock product
    put:
      summary: Update stock products
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ../models/UpdateProductStock.yaml
      operationId: update-stock-products
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../models/UpdateProductStock.yaml
      description: "Update an existing stock product by editing details or creating new variations. \r\n\r\n> 1. Ensure all field values (Including those that aren't being updated) are in the request otherwise they will be overwritten to be empty\r\n> 2. To update an existing variation, the child/variation level `productId` is required.\r\n> 3. To create a new variation, the child/variation level `externalId` is required (with no `productId`)."
  '/products/stock/{parentProductId}/quantity':
    put:
      summary: Update stock quantity
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ../models/UpdateProductStock.yaml
      operationId: update-stock-quantity
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
              properties:
                productId:
                  type: integer
                  description: Unique `productId` of the child product
                  example: 245252
                quantity:
                  type:
                    - integer
                    - 'null'
                  description: The new quantity of the product
                  minimum: 0
                  format: int32
      x-internal: false
      description: "Update an existing stock product by editing the quantity.\r\n\r\n* Setting `quantity` to `null` will set the stock quantity to **unlimited**\r\n* `quantity` cannot be set to `null` if `parLevel` is not set to zero (`0`) \r\n"
    parameters:
      - $ref: '#/components/parameters/parentProductId'
  /capacity-reservation:
    post:
      tags:
        - Capacity Reservation
      summary: Validate and reserve capacity
      responses:
        '200':
          description: The unique capacity reservation Id
          content:
            application/json:
              schema:
                type: object
                properties:
                  uniqueId:
                    type: string
                    description: The unique capacity reservation Id
                    example: ffdae420-a912-4d93-9234-9faca5e6194f
        '409':
          description: Invalid Reservation
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: LocationFullyBooked
                        message:
                          type: string
                          description: Error message
                          example: 'Fully booked on 10 Aug, 9:00 AM'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  description: 'The products being purchased, known as booking items'
                  items:
                    $ref: ../models/BookingCreateItem.yaml
      description: |-
        > Validate and reserve capacity prior to creating a booking.
        > This endpoint is used to ensure there is no double booking of capacity within ROLLER.
      operationId: validate-and-reserve-capacity
  '/capacity-reservation/{uniqueId}':
    delete:
      tags:
        - Capacity Reservation
      summary: Delete a capacity reservation
      responses:
        '200':
          description: Deleted successfully
        '400':
          description: Invalid request
      description: |-
        > Delete a capacity reservation.
        > Use this endpoint to clear out existing reserved capacity so other customers may book.
        > Capacity reservations that are not deleted will automatically expire after 10 minutes.
      operationId: delete-a-capacity-reservation
    parameters:
      - $ref: '#/components/parameters/uniqueId'
  /capacity-reservation/block:
    post:
      tags:
        - Capacity Reservation
      summary: Block resource capacity
      responses:
        '200':
          description: The unique resource capacity block ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resourceCapacityBlockId:
                    type: integer
                    description: The unique resource capacity block ID
                    example: 5516
        '409':
          description: "* Resource could not be found\r\n* Resource will go over available capacity\r\n* Resource already booked or blocked out "
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - resourceId
                - blockoutCapacity
                - date
              properties:
                resourceId:
                  type: integer
                  description: The ID of the resource being blocked
                blockoutCapacity:
                  type: integer
                  description: The total capacity to block out
                date:
                  type: string
                  format: date
                  description: The date of the capacity block (In ISO8601 date format only)
                startTime:
                  type: string
                  description: "Start time in 24h format \r\n\r\n* eg: 00:00 = 12:00 AM (Midnight)\r\n* eg: 23:59 = 11:59 PM\r\n\r\nRequired if `blockEntireDay` is `false`"
                endTime:
                  type: string
                  description: "End time in 24h format \r\n\r\n* eg: 00:00 = 12:00 AM (Midnight)\r\n* eg: 23:59 = 11:59 PM\r\n\r\nRequired if `blockEntireDay` is `false`"
                blockEntireDay:
                  type: boolean
                  description: Boolean indicating if the block applies to the entire day
                notes:
                  type: string
                  description: Additional notes or reason for the block
      description: '> Block capacity for the specified resource.'
      operationId: block-resource-capacity
    get:
      summary: Search resource capacity blocks
      tags:
        - Capacity Reservation
      responses:
        '200':
          description: A list of resource capacity blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../models/ResourceCapacityBlock.yaml
      operationId: search-resource-capacity-blocks
      description: '> Search for existing resource capacity blocks.'
      parameters:
        - in: query
          description: The optional date for which to retrieve capacity blocks in ISO8601 format (`yyyy-MM-dd`)
          name: date
          schema:
            example: '2025-07-14'
        - schema:
            type: string
            example: '30539'
          in: query
          name: resourceId
          description: The optional ID of the resource to filter by
  '/capacity-reservation/block/{blockId}':
    parameters:
      - $ref: '#/components/parameters/blockId'
    delete:
      summary: Delete resource capacity block
      tags:
        - Capacity Reservation
      responses:
        '200':
          description: Capacity block successfully deleted.
        '404':
          description: Resource capacity block not found.
      operationId: delete-resource-capacity-block
      description: '> Delete an existing resource capacity block.'
    get:
      summary: Get resource capacity block
      tags:
        - Capacity Reservation
      responses:
        '200':
          description: A resource capacity block
          content:
            application/json:
              schema:
                $ref: ../models/ResourceCapacityBlock.yaml
        '404':
          description: Resource capacity block not found
      operationId: get-resource-capacity-block
      description: '> Get an existing resource capacity block.'
  /bookings:
    post:
      summary: Create a booking
      responses:
        '201':
          description: Booking identifiers
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookingReference:
                    type: string
                    description: The booking reference exposed within ROLLER and what the customer receives
                    example: '77465528'
                  uniqueId:
                    type: string
                    description: The bookings unique identifier
                    example: 79189348-70fe-4347-bc0f-8887df841a3a
        '409':
          description: Invalid Booking
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: VenueCapacity
                        message:
                          type: string
                          description: Error message
                          example: Venue capacity will be exceeded
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - externalId
                - customer
                - items
              properties:
                externalId:
                  type: string
                  description: 3rd party booking reference
                  example: UJJSK28374
                  maxLength: 64
                name:
                  type: string
                  description: Title of the booking. Name can be different to the booking owner name (defaults to the booking owner's name if not specified)
                  example: Sports Group Booking
                  maxLength: 128
                comments:
                  type: string
                  description: Additional detail about the booking
                  example: Customer has not visited before
                  maxLength: 500
                purchaseDate:
                  type:
                    - string
                    - 'null'
                  description: Optionally provide the creation datetime in UTC - generally used when re-creating bookings and needing to retain the original datetime
                  example: '2020-07-29T06:57:18.5306035+00:00'
                  format: date-time
                capacityReservationId:
                  type:
                    - string
                    - 'null'
                  description: The GUID returned from the capacity reservation API - it's recommended to use the capacity reservation API otherwise the request may be rejected
                  example: c07128c8-adb1-45a0-9241-dc3875518468
                companyId:
                  type:
                    - integer
                    - 'null'
                  description: Id of the company making the booking
                  example: 12345
                customer:
                  $ref: ../models/BookingCreateCustomer.yaml
                  description: 'The booking owner, i.e. the primary contact or person who paid for the booking'
                items:
                  type: array
                  description: 'The products being purchased, known as booking items'
                  items:
                    $ref: ../models/BookingCreateItem.yaml
                payments:
                  type: array
                  description: 'Any initial payments for the booking (the booking can be unpaid, partially paid or fully paid)'
                  items:
                    $ref: ../models/PaymentCreate.yaml
                discounts:
                  type: array
                  description: Any discount codes or custom discounts applied to the booking
                  items:
                    $ref: ../models/BookingCreateDiscount.yaml
                giftCards:
                  type: array
                  description: Any gift cards applied to the booking for paying down the booking subtotal. These payments do not need to cover the whole cost.
                  items:
                    $ref: ../models/BookingCreateGiftCard.yaml
                sendConfirmations:
                  type: boolean
                  description: When true ROLLER will send the booking confirmation / tickets to the customer automatically
                  example: false
                customerPaysFees:
                  type: boolean
                  description: When true fees setup in ROLLER are applied. Please note if manual `creditCardFees` are provided in the request it will override all fees setup in ROLLER.
                  default: false
                posNotes:
                  type: string
                  description: Additional detail when processing a booking from POS
                automaticCancelHours:
                  type:
                    - integer
                    - 'null'
                  example: 1
                  description: 'The number of hours until the booking will auto-expire, used to create a tentative booking. Leave empty if unused. '
                metadata:
                  type: object
                  description: 'User-defined key-value pairs to store against the booking. Supports up to 20 entries. Keys are case-sensitive strings (max 40 characters). Values are strings (max 500 characters, HTML stripped on write).'
                  additionalProperties:
                    type: string
                  example:
                    reservationSource: partner-portal
                    groupId: '881234'
        description: ''
      description: "Create a booking in ROLLER, and optionally add an associated payment record.\r\n\r\n> **Guest Records**\r\n> * Values provided in the `customer` object will create a **Guest** record\r\n> * This Guest record will be automatically attached to the booking as the **booking holder**\r\n> * An existing Guest record will be used where a match is found on `email`\r\n> * Where a match is found and other fields on the record are different, they will be updated to reflect the new value"
      operationId: create-a-booking
      tags:
        - Booking Management
    get:
      summary: Search for bookings
      description: "Returns basic booking detail for up to 100 of the most recent bookings based on search criteria.\r\n<!-- theme: warning -->\r\n> At least one search criteria query parameter is required."
      parameters:
        - name: keywords
          in: query
          description: 'Keywords will search on `Booking Name`, `Ticket ID`, `Custom Ticket ID`, guest `First name`, `Last name`, `Email` and `Phone`. <ul> <li>A minimum of 3 characters are required</li> <li>Results are subject to a degree of fuzzy search</li> <li>Only up to the most recent 100 bookings will be returned</li> </ul>'
          schema:
            type: string
            example: Andrew Smith
        - name: date
          in: query
          description: Booking date of booking items on the booking
          schema:
            type: string
            example: '2025-07-14'
            format: date
        - name: startTime
          in: query
          description: Session start time (only applies to session products) in 24hr format
          schema:
            type: string
            example: '14:00'
        - name: productIds
          in: query
          description: Comma separated product IDs. Date is required when using this parameter
          schema:
            type: string
            example: '23882991'
        - name: locationIds
          in: query
          description: Comma separated resource IDs (Formerly location IDs). Date is required when using this parameter
          schema:
            type: string
            example: '27366'
      responses:
        '200':
          description: Booking detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
