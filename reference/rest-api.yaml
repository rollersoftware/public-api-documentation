                discounts:
                  type: array
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        description: Discount code being used on the booking (can apply multiple)
                        example: AN829910
                giftCards:
                  type: array
                  items:
                    type: object
                    properties:
                      giftCardNumber:
                        type: string
