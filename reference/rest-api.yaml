      operationId: delete-webhook
    parameters:
      - $ref: '#/components/parameters/webhookId'
  /venues/me:
    get:
      tags:
        - Venue Information
      summary: Get venue detail
      description: '> Returns detail of the venue for your API keys'
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: ROLLER Venue ID
                    example: 20981
                  name:
                    type: string
                    description: Venue name
                    example: ROLLER World Australia
                  timeZone:
                    type: string
                    description: Venue local timezone
                    example: '(UTC+10:00) Brisbane'
                  ianaTimeZone:
                    type: string
                    example: '(UTC+10:00) Brisbane'
                    description: IANA timezone
                  countryCode:
                    type: string
                    description: Country code where the venue is located
                    example: AU
                  country:
                    type: string
                    description: Country the venue is located
                    example: Australia
                  currency:
                    type: string
                    description: Venue trading currency
                    example: AUD
                  locale:
                    type: string
                    description: locale code where the venue is located
                    example: en-AU
                  productPricesIncludeTax:
                    type: boolean
                    description: Whether or not the prices of products for the venue include taxes
                    example: true
                  transactionFeePercent:
                    type: number
                    description: The % amount of fees charged to customers for Online Checkout payments
                    example: 3
                  creditCardFeePercent:
                    type: number
                    description: The % amount of fees charged on Card payments on the Online Checkout and in Venue Manager
                    example: 2.5
                  feePerTransaction:
                    type: number
                    description: The $ amount of fees charged to customers for Online Checkout payments
                    example: 1.5
                  codeOfConduct:
                    type: string
                    description: The terms and conditions set by the venue for customers when they make a purchase
                    example: customers must agree to xyz
                  paymentSettings:
                    type: object
                    properties:
                      apiUrl:
                        type: string
                        description: URL for the payment service
                        example: 'https://payment.service.roller.app'
                      configurationId:
                        type: string
                        example: ee1807ae-58f8-4438-b17b-b60f7810a0cf
                        format: uuid
                      integrationId:
                        type: string
                        example: bf8abcf0-f773-42cb-b1ea-f42b9f1d488b
                        format: uuid
                  taxes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 45
                          description: Unique taxId
                        name:
                          type: string
                          example: State Tax
                          description: Name of the defined tax rate
                        taxPercent:
                          type: number
                          example: 8.5
                          description: Percent of the defined tax rate (Expressed as a number between 0 - 100)
                        isDefault:
                          type: boolean
                          description: Whether this tax rate is the default for all products (Until a different tax rate is chosen or a tax override is set on the product)
                  taxComponents:
                    type: array
                    description: List of tax components applicable to the venue
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        taxPercent:
                          type: string
                  venueGroups:
                    type: array
                    description: List of venue groups (i.e. tags) defined within HQ venues that group together controlled venues
                    items:
                      type: object
                      properties:
                        hqVenueGroupTag:
                          type: string
                          description: Name of the HQ venue tag
                        hqVenueUniqueIds:
                          type: array
                          description: List of controlled venue IDs that belong to this HQ venue tag
                          items:
                            type: string
                            format: uuid
      operationId: get-venue-detail
