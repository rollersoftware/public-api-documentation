  /redemptions:
    post:
      tags:
        - Redemption
      summary: Redeem tickets
      responses:
        '200':
          description: Redeemed successfully
        '409':
          description: "Invalid redemption. \r\n\r\nPossible error messages:\r\n* Ticket does not exist\r\n* Booking Cancelled\r\n* Ticket is not valid for this date\r\n* Ticket IDs must be unique per request\r\n* Ticket usage exhausted\r\n* Product type not accepted\r\n* Membership Invalid\r\n* Ticket redemption usage exhausted\r\n* Redemption device not found\r\n* Duplicate custom ticket IDs found\r\n* Custom ticket ID not found\r\n\r\nIf using **Redemption device** setting `Validate session times`:\r\n* Ticket cannot be redeemed before the session start time\r\n* Ticket cannot be redeemed after the session end time\r\n"
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: InvalidRedemption
                        message:
                          type: string
                          description: Error message
                          example: Ticket usage exhausted
                        ticketId:
                          type: string
                          description: TicketId with the error
                          example: 2883977-98736472
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tickets:
                  type: array
                  maxItems: 10
                  uniqueItems: true
                  items:
                    type: object
                    required:
                      - ticketId
                    properties:
                      ticketId:
                        type: string
                        description: ROLLER Ticket ID being redeemed. This can either be the ROLLER generated `ticketId` or a `customTicketId` if applied.
                        example: 3288921-29937813
                      redemptionDate:
                        type: string
                        description: 'Optionally provide the redemption datetime in UTC. If not present, the datetime of the API call will be used'
                        example: '2020-07-29T06:57:18.5326035+00:00'
                redemptionDevice:
                  type: string
                  description: 'The name of the device where the ticket is being redeemed. Includes redemption devices, POS, MCI and SSK devices.'
      description: "> Redeem tickets in ROLLER\r\n\r\n* There is a maximum of 10 ticket redemptions per call\r\n* Redeemed Ticket IDs must be unique per call\r\n* Only the following products are supported for redemption via API:\r\n  * Standard Passes\r\n  * Session Passes\r\n  * Recurring Sessions\r\n  * Memberships (the booking item, not the membership discount) "
      operationId: redeem-tickets
  /giftcards:
    post:
      tags:
        - Gift Card
      summary: Create gift cards
      operationId: create-gift-cards
      description: "Create one or more gift cards for a single gift card product. Each entry in `giftCards` creates one card, and all cards are created against a single booking owned by `bookingOwner`.\r\n\r\nGift card numbers are returned in `giftCardNumbers`, in the same order as the request — a caller-supplied `giftCardNumber` is echoed back, otherwise a generated number is returned. Cards are activated asynchronously shortly after creation.\r\n\r\n* `externalId` is unique per venue and acts as an idempotency key. Reusing one returns a `409`.\r\n* `value` is required for open-value gift card products, and rejected for fixed-value products.\r\n* A `recipient` must include both `name` and `email`, or neither.\r\n* When `sendGiftCardEmails` is `true`, every card must have a recipient `name` and `email`.\r\n* `deliveryDateTime` must be in the future (UTC)."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - externalId
                - productId
                - bookingOwner
                - giftCards
              properties:
                externalId:
                  type: string
                  maxLength: 64
                  description: External reference for this request. Unique per venue, and acts as an idempotency key.
                  example: RESELLER-ORDER-2026-0045
                productId:
                  type: integer
                  format: int32
                  description: The ID of the gift card product to create cards from. Must be a gift card product in the venue.
                  example: 9573
                bookingOwner:
                  type: object
                  description: The primary contact for the booking the gift cards are created against.
                  required:
                    - firstName
                    - lastName
                    - email
                    - phone
                  properties:
                    firstName:
                      type: string
                      maxLength: 32
                      example: Jordan
                    lastName:
                      type: string
                      maxLength: 32
                      example: Avery
                    email:
                      type: string
                      maxLength: 256
                      description: Receives the booking confirmation when `sendConfirmations` is `true`.
                      example: jordan.avery@acme-resellers.com
                    phone:
                      type: string
                      maxLength: 20
                      example: '+61 400 123 456'
                giftCards:
                  type: array
                  minItems: 1
                  description: The gift cards to create. Each entry produces one card.
                  items:
                    type: object
                    properties:
                      giftCardNumber:
                        type: string
                        minLength: 6
                        maxLength: 128
                        description: Optional custom gift card number. Must be unique within the request and the venue. Omit to have a number generated.
                        example: ACME-PROMO-000124
                      value:
                        type: number
                        description: The value to load on the card. Required for open-value products, rejected for fixed-value products. Must be greater than zero.
                        example: 50
                      recipient:
                        type:
                          - object
                          - 'null'
                        description: The recipient the card is addressed to. Omit or set to null for an unassigned card.
                        properties:
                          name:
                            type: string
                            description: Required together with `email`.
                            example: Sam Rivera
                          email:
                            type: string
                            description: Required together with `name`.
                            example: sam.rivera@example.com
                          message:
                            type: string
                            maxLength: 500
                            description: Optional personal message shown on the card and in the recipient email.
                            example: Happy birthday! Enjoy a day out on us.
                          deliveryDateTime:
                            type: string
                            format: date-time
                            description: Optional scheduled send time in UTC. Must be in the future, and requires a recipient `name` and `email`.
                            example: '2026-12-24T09:00:00Z'
                sendConfirmations:
                  type: boolean
                  default: false
                  description: When `true`, sends the booking confirmation to the booking owner after creation.
                sendGiftCardEmails:
                  type: boolean
                  default: false
                  description: When `true`, sends each card's recipient their gift card email. Every card must then have a recipient `name` and `email`.
      responses:
        '200':
          description: Gift cards created
          content:
            application/json:
              schema:
                type: object
                properties:
                  giftCardNumbers:
                    type: array
                    description: The created gift card numbers, in the same order as the gift cards in the request. Caller-supplied numbers are echoed back; otherwise the generated number is returned.
                    items:
                      type: string
                    example:
                      - '2606947188'
                      - '2606749291'
                      - ACME-PROMO-000124
        '400':
          description: 'Bad Request - The request body failed validation (eg: a required field is missing, an email is invalid, or a length limit is exceeded).'
        '409':
          description: 'Conflict - A business rule was violated (eg: the externalId already exists, the product is not a gift card, or a gift card number is not unique).'
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the error
                          example: ExternalId
                        message:
                          type: string
                          description: Error message
                          example: The booking RESELLER-ORDER-2026-0045 already exists
