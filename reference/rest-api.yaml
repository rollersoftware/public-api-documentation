                          type: number
                          description: Dollar value being deducted from the gift card when this booking is published
                          example: 20
                  giftCardErrors:
                    type: array
                    items:
                      type: string
                      description: Error message/s for gift card/s redeemed
                      example: Could not find giftcard for number 8839920172
        '409':
          description: Invalid Booking
